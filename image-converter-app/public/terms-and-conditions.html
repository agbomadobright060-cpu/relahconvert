      el: { nav_more:'Περισσότερα εργαλεία', nav:{'compress':'Συμπίεση εικόνας','resize':'Αλλαγή μεγέθους','jpg-to-png':'JPG σε PNG','jpg-to-pdf':'JPG σε PDF','png-to-jpg':'PNG σε JPG','jpg-to-webp':'JPG σε WebP','webp-to-jpg':'WebP σε JPG','png-to-webp':'PNG σε WebP','webp-to-png':'WebP σε PNG','png-to-pdf':'PNG σε PDF'}, footer_copy:'© 2026 RelahConvert. Με επιφύλαξη παντός δικαιώματος.', hero_h1:'Όροι και <em>προϋποθέσεις</em>', hero_sub:'Τελευταία ενημέρωση: Μάρτιος 2026', s1_h:'Χρήση της υπηρεσίας', s1_p:'Το RelahConvert παρέχει δωρεάν εργαλεία εικόνας βασισμένα σε πρόγραμμα περιήγησης για προσωπική και εμπορική χρήση. Χρησιμοποιώντας αυτήν την υπηρεσία, συμφωνείτε με αυτούς τους όρους. Δεν επιτρέπεται η χρήση αυτής της υπηρεσίας για παράνομους σκοπούς.', s2_h:'Καμία εγγύηση', s2_p:'Αυτή η υπηρεσία παρέχεται «ως έχει» χωρίς εγγυήσεις οποιουδήποτε είδους. Δεν εγγυόμαστε αδιάλειπτη διαθεσιμότητα ή λειτουργία χωρίς σφάλματα. Η χρήση αυτής της υπηρεσίας γίνεται με δική σας ευθύνη.', s3_h:'Περιορισμός ευθύνης', s3_p:'Το RelahConvert δεν ευθύνεται για οποιαδήποτε απώλεια ή ζημία που προκύπτει από τη χρήση αυτής της υπηρεσίας, συμπεριλαμβανομένων ενδεικτικά της απώλειας δεδομένων, της καταστροφής αρχείων ή της απώλειας επιχειρηματικής δραστηριότητας.', s4_h:'Πνευματική ιδιοκτησία', s4_p:'Το όνομα, το λογότυπο και ο σχεδιασμός του ιστότοπου του RelahConvert αποτελούν πνευματική ιδιοκτησία των αντίστοιχων ιδιοκτητών τους. Διατηρείτε πλήρη κυριότητα όλων των εικόνων που επεξεργάζεστε μέσω αυτής της υπηρεσίας.', s5_h:'Αλλαγές στους όρους', s5_p:'Ενδέχεται να ενημερώνουμε αυτούς τους όρους κατά καιρούς. Η συνέχιση της χρήσης της υπηρεσίας μετά τη δημοσίευση αλλαγών συνιστά αποδοχή των νέων όρων.' },
      hi: { nav_more:'अधिक उपकरण', nav:{'compress':'छवि संपीड़ित करें','resize':'आकार बदलें','jpg-to-png':'JPG से PNG','jpg-to-pdf':'JPG से PDF','png-to-jpg':'PNG से JPG','jpg-to-webp':'JPG से WebP','webp-to-jpg':'WebP से JPG','png-to-webp':'PNG से WebP','webp-to-png':'WebP से PNG','png-to-pdf':'PNG से PDF'}, footer_copy:'© 2026 RelahConvert. सर्वाधिकार सुरक्षित।', hero_h1:'नियम और <em>शर्तें</em>', hero_sub:'अंतिम अपडेट: मार्च 2026', s1_h:'सेवा का उपयोग', s1_p:'RelahConvert व्यक्तिगत और व्यावसायिक उपयोग के लिए मुफ्त, ब्राउज़र-आधारित छवि उपकरण प्रदान करता है। इस सेवा का उपयोग करके, आप इन शर्तों से सहमत होते हैं। आप इस सेवा का उपयोग किसी भी गैरकानूनी उद्देश्य के लिए नहीं कर सकते।', s2_h:'कोई वारंटी नहीं', s2_p:'यह सेवा किसी भी प्रकार की वारंटी के बिना "जैसी है" प्रदान की जाती है। हम निर्बाध उपलब्धता या त्रुटि-मुक्त संचालन की गारंटी नहीं देते। इस सेवा का उपयोग आपके अपने जोखिम पर है।', s3_h:'दायित्व की सीमा', s3_p:'RelahConvert इस सेवा के उपयोग से उत्पन्न होने वाली किसी भी हानि या क्षति के लिए उत्तरदायी नहीं होगा, जिसमें डेटा हानि, फ़ाइल भ्रष्टाचार या व्यापार हानि शामिल है लेकिन इन्हीं तक सीमित नहीं है।', s4_h:'बौद्धिक संपदा', s4_p:'RelahConvert का नाम, लोगो और वेबसाइट डिज़ाइन उनके संबंधित स्वामियों की बौद्धिक संपदा हैं। आप इस सेवा के माध्यम से संसाधित की गई किसी भी छवि का पूर्ण स्वामित्व बनाए रखते हैं।', s5_h:'शर्तों में परिवर्तन', s5_p:'हम समय-समय पर इन शर्तों को अपडेट कर सकते हैं। परिवर्तन पोस्ट किए जाने के बाद सेवा का निरंतर उपयोग नई शर्तों की स्वीकृति मानी जाएगी।' },
      id: { nav_more:'Alat lainnya', nav:{'compress':'Kompres Gambar','resize':'Ubah Ukuran','jpg-to-png':'JPG ke PNG','jpg-to-pdf':'JPG ke PDF','png-to-jpg':'PNG ke JPG','jpg-to-webp':'JPG ke WebP','webp-to-jpg':'WebP ke JPG','png-to-webp':'PNG ke WebP','webp-to-png':'WebP ke PNG','png-to-pdf':'PNG ke PDF'}, footer_copy:'© 2026 RelahConvert. Hak cipta dilindungi undang-undang.', hero_h1:'Syarat dan <em>Ketentuan</em>', hero_sub:'Terakhir diperbarui: Maret 2026', s1_h:'Penggunaan Layanan', s1_p:'RelahConvert menyediakan alat gambar gratis berbasis browser untuk penggunaan pribadi dan komersial. Dengan menggunakan layanan ini, Anda menyetujui ketentuan ini. Anda tidak boleh menggunakan layanan ini untuk tujuan yang melanggar hukum.', s2_h:'Tanpa Jaminan', s2_p:'Layanan ini disediakan "apa adanya" tanpa jaminan dalam bentuk apa pun. Kami tidak menjamin ketersediaan tanpa gangguan atau operasi bebas kesalahan. Penggunaan layanan ini merupakan risiko Anda sendiri.', s3_h:'Batasan Tanggung Jawab', s3_p:'RelahConvert tidak bertanggung jawab atas kerugian atau kerusakan apa pun yang timbul dari penggunaan layanan ini, termasuk namun tidak terbatas pada kehilangan data, kerusakan file, atau kehilangan bisnis.', s4_h:'Kekayaan Intelektual', s4_p:'Nama, logo, dan desain situs web RelahConvert adalah kekayaan intelektual dari pemiliknya masing-masing. Anda mempertahankan kepemilikan penuh atas gambar apa pun yang Anda proses melalui layanan ini.', s5_h:'Perubahan Ketentuan', s5_p:'Kami dapat memperbarui ketentuan ini dari waktu ke waktu. Penggunaan layanan yang berkelanjutan setelah perubahan diposting merupakan penerimaan terhadap ketentuan baru.' },
      ms: { nav_more:'Lagi alat', nav:{'compress':'Mampat Imej','resize':'Ubah Saiz','jpg-to-png':'JPG ke PNG','jpg-to-pdf':'JPG ke PDF','png-to-jpg':'PNG ke JPG','jpg-to-webp':'JPG ke WebP','webp-to-jpg':'WebP ke JPG','png-to-webp':'PNG ke WebP','webp-to-png':'WebP ke PNG','png-to-pdf':'PNG ke PDF'}, footer_copy:'© 2026 RelahConvert. Hak cipta terpelihara.', hero_h1:'Terma dan <em>Syarat</em>', hero_sub:'Kemas kini terakhir: Mac 2026', s1_h:'Penggunaan Perkhidmatan', s1_p:'RelahConvert menyediakan alat imej percuma berasaskan pelayar untuk kegunaan peribadi dan komersial. Dengan menggunakan perkhidmatan ini, anda bersetuju dengan terma ini. Anda tidak boleh menggunakan perkhidmatan ini untuk sebarang tujuan yang menyalahi undang-undang.', s2_h:'Tiada Jaminan', s2_p:'Perkhidmatan ini disediakan "seadanya" tanpa sebarang jaminan. Kami tidak menjamin ketersediaan tanpa gangguan atau operasi tanpa ralat. Penggunaan perkhidmatan ini adalah atas risiko anda sendiri.', s3_h:'Had Liabiliti', s3_p:'RelahConvert tidak akan bertanggungjawab atas sebarang kehilangan atau kerosakan yang timbul daripada penggunaan perkhidmatan ini, termasuk tetapi tidak terhad kepada kehilangan data, kerosakan fail, atau kehilangan perniagaan.', s4_h:'Harta Intelek', s4_p:'Nama, logo dan reka bentuk laman web RelahConvert adalah harta intelek pemilik masing-masing. Anda mengekalkan pemilikan penuh ke atas sebarang imej yang anda proses melalui perkhidmatan ini.', s5_h:'Perubahan Terma', s5_p:'Kami mungkin mengemas kini terma ini dari semasa ke semasa. Penggunaan perkhidmatan yang berterusan selepas perubahan disiarkan merupakan penerimaan terma baharu.' },
      pl: { nav_more:'Więcej narzędzi', nav:{'compress':'Kompresuj obraz','resize':'Zmień rozmiar','jpg-to-png':'JPG do PNG','jpg-to-pdf':'JPG do PDF','png-to-jpg':'PNG do JPG','jpg-to-webp':'JPG do WebP','webp-to-jpg':'WebP do JPG','png-to-webp':'PNG do WebP','webp-to-png':'WebP do PNG','png-to-pdf':'PNG do PDF'}, footer_copy:'© 2026 RelahConvert. Wszelkie prawa zastrzeżone.', hero_h1:'Regulamin i <em>warunki</em>', hero_sub:'Ostatnia aktualizacja: marzec 2026', s1_h:'Korzystanie z usługi', s1_p:'RelahConvert zapewnia bezpłatne narzędzia do obróbki obrazów działające w przeglądarce, przeznaczone do użytku osobistego i komercyjnego. Korzystając z tej usługi, zgadzasz się na niniejsze warunki. Nie wolno korzystać z tej usługi w celach niezgodnych z prawem.', s2_h:'Brak gwarancji', s2_p:'Usługa ta jest świadczona „w stanie, w jakim się znajduje", bez jakichkolwiek gwarancji. Nie gwarantujemy nieprzerwanej dostępności ani bezbłędnego działania. Korzystanie z tej usługi odbywa się na własne ryzyko.', s3_h:'Ograniczenie odpowiedzialności', s3_p:'RelahConvert nie ponosi odpowiedzialności za jakiekolwiek straty lub szkody wynikające z korzystania z tej usługi, w tym między innymi za utratę danych, uszkodzenie plików lub straty w działalności gospodarczej.', s4_h:'Własność intelektualna', s4_p:'Nazwa RelahConvert, logo i projekt strony internetowej stanowią własność intelektualną ich odpowiednich właścicieli. Zachowujesz pełną własność wszelkich obrazów przetworzonych za pośrednictwem tej usługi.', s5_h:'Zmiany warunków', s5_p:'Możemy od czasu do czasu aktualizować niniejsze warunki. Dalsze korzystanie z usługi po opublikowaniu zmian oznacza akceptację nowych warunków.' },
      sv: { nav_more:'Fler verktyg', nav:{'compress':'Komprimera bild','resize':'Ändra storlek','jpg-to-png':'JPG till PNG','jpg-to-pdf':'JPG till PDF','png-to-jpg':'PNG till JPG','jpg-to-webp':'JPG till WebP','webp-to-jpg':'WebP till JPG','png-to-webp':'PNG till WebP','webp-to-png':'WebP till PNG','png-to-pdf':'PNG till PDF'}, footer_copy:'© 2026 RelahConvert. Alla rättigheter förbehållna.', hero_h1:'Villkor och <em>bestämmelser</em>', hero_sub:'Senast uppdaterad: mars 2026', s1_h:'Användning av tjänsten', s1_p:'RelahConvert tillhandahåller gratis webbläsarbaserade bildverktyg för personligt och kommersiellt bruk. Genom att använda denna tjänst godkänner du dessa villkor. Du får inte använda denna tjänst för något olagligt ändamål.', s2_h:'Ingen garanti', s2_p:'Denna tjänst tillhandahålls "i befintligt skick" utan garantier av något slag. Vi garanterar inte oavbruten tillgänglighet eller felfri drift. Användning av denna tjänst sker på egen risk.', s3_h:'Ansvarsbegränsning', s3_p:'RelahConvert ansvarar inte för förluster eller skador som uppstår vid användning av denna tjänst, inklusive men inte begränsat till dataförlust, filkorruption eller affärsförlust.', s4_h:'Immateriella rättigheter', s4_p:'RelahConverts namn, logotyp och webbplatsdesign är immateriell egendom tillhörande respektive ägare. Du behåller fullständig äganderätt till alla bilder du bearbetar genom denna tjänst.', s5_h:'Ändringar av villkoren', s5_p:'Vi kan uppdatera dessa villkor från tid till annan. Fortsatt användning av tjänsten efter att ändringar har publicerats innebär godkännande av de nya villkoren.' },
