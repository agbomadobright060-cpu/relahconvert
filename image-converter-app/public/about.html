<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About RelahConvert</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=DM+Sans:wght@400;500;600&display=swap">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; }
    body { background: #F2F2F2; font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; }
    #site-header { background: #fff; border-bottom: 1px solid #E8E0D5; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .logo { font-family: 'Fraunces', serif; font-size: 24px; color: #2C1810; text-decoration: none; letter-spacing: -0.02em; flex-shrink: 0; display: flex; align-items: center; gap: 7px; line-height: 1; }
    .logo .relah { font-weight: 400; color: #2C1810; } .logo .convert { font-weight: 900; font-style: italic; color: #C84B31; }
    .desktop-nav { display: flex; align-items: center; }
    .nav-link { padding: 8px 14px; font-size: 12px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: #5A4A3A; text-decoration: none; transition: color 0.15s; white-space: nowrap; }
    .nav-link:hover { color: #C84B31; }
    .more-btn { padding: 8px 14px; font-size: 12px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: #5A4A3A; background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: 'DM Sans', sans-serif; transition: color 0.15s; }
    .more-btn:hover { color: #C84B31; } .more-btn .arrow { font-size: 10px; transition: transform 0.15s; } .more-btn.open .arrow { transform: rotate(180deg); }
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 6px; flex-direction: column; gap: 5px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: #2C1810; border-radius: 2px; }
    #dropdown-menu { display: none; position: fixed; top: 64px; left: 0; right: 0; background: #fff; border-bottom: 1px solid #E8E0D5; box-shadow: 0 8px 24px rgba(0,0,0,0.1); z-index: 99; max-height: calc(100vh - 64px); overflow-y: auto; }
    #dropdown-menu.open { display: block; }
    .dropdown-inner { max-width: 1100px; margin: 0 auto; padding: 16px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
    .dropdown-inner a { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; color: #2C1810; text-decoration: none; transition: all 0.15s; }
    .dropdown-inner a:hover { background: #F5F0E8; color: #C84B31; }
    .page-content { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; flex: 1; }
    .page-hero { margin-bottom: 40px; }
    .page-hero h1 { font-family: 'Fraunces', serif; font-size: clamp(28px, 4vw, 42px); font-weight: 900; color: #2C1810; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 10px; }
    .page-hero h1 em { font-style: italic; color: #C84B31; }
    .page-hero p { font-size: 15px; color: #7A6A5A; line-height: 1.7; }
    .section { background: #fff; border-radius: 16px; padding: 32px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .section h2 { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; color: #2C1810; margin-bottom: 14px; letter-spacing: -0.01em; }
    .section p { font-size: 14px; color: #5A4A3A; line-height: 1.75; margin-bottom: 12px; }
    .section p:last-child { margin-bottom: 0; }
    .feature-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
    .feature-list li { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: #5A4A3A; line-height: 1.6; }
    .feature-list li::before { content: '✦'; color: #C84B31; font-size: 11px; margin-top: 3px; flex-shrink: 0; }
    #site-footer { background: #F2F2F2; padding: 20px 24px; text-align: center; border-top: 1px solid #E8E0D5; }
    .footer-copy { font-size: 12px; color: #9A8A7A; }
    .lang-bar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; font-size: 12px; color: #9A8A7A; }
    .lang-select { background: #fff; border: 1px solid #DDD5C8; color: #5A4A3A; font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 5px 10px; border-radius: 6px; cursor: pointer; outline: none; }
    .lang-select:focus { border-color: #C84B31; }
    @media (max-width: 768px) { .desktop-nav { display: none; } .hamburger { display: flex; } .section { padding: 24px; } .dropdown-inner { grid-template-columns: 1fr 1fr; padding: 12px; gap: 6px; } }
  </style>
</head>
<body>
  <header id="site-header">
    <div class="header-inner">
      <a href="/" class="logo">
        <svg width="22" height="18" viewBox="0 0 26 20" style="flex-shrink:0;"><polygon points="9,1 17,10 9,19 1,10" fill="#C84B31" opacity="0.5"/><polygon points="17,1 25,10 17,19 9,10" fill="#C84B31"/><polygon points="17,1 25,10 17,10" fill="#2C1810" opacity="0.18"/></svg>
        <span><span class="relah">relah</span><span class="convert">convert</span></span>
      </a>
      <nav class="desktop-nav" id="desktopNav"></nav>
      <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
    </div>
  </header>
  <div id="dropdown-menu"><div class="dropdown-inner" id="dropdownInner"></div></div>

  <main class="page-content">
    <div class="page-hero">
      <h1 id="heroH1"></h1>
      <p id="heroP"></p>
    </div>
    <div class="section"><h2 id="s1h"></h2><p id="s1p1"></p><p id="s1p2"></p></div>
    <div class="section"><h2 id="s2h"></h2><p id="s2p"></p></div>
    <div class="section"><h2 id="s3h"></h2><ul class="feature-list" id="featureList"></ul></div>
  </main>

  <footer id="site-footer">
    <p class="footer-copy" id="footerCopy"></p>
    <div class="lang-bar"><span>🌐</span><select class="lang-select" id="langSelect"></select></div>
  </footer>

  <script>
    var T = {
      en: { nav_more:'More Tools', nav:{'compress':'Compress Image','resize':'Resize Image','jpg-to-png':'JPG to PNG','jpg-to-pdf':'JPG to PDF','png-to-jpg':'PNG to JPG','jpg-to-webp':'JPG to WebP','webp-to-jpg':'WebP to JPG','png-to-webp':'PNG to WebP','webp-to-png':'WebP to PNG','png-to-pdf':'PNG to PDF'}, footer_copy:'© 2026 RelahConvert. All rights reserved.', hero_h1:'About <em>RelahConvert</em>', hero_p:'Free image tools built for everyone — with privacy at the core.', s1_h:'Who We Are', s1_p1:'RelahConvert is a free, browser-based image tool suite built for anyone who needs to convert, compress, or resize images quickly — without uploading files to a server.', s1_p2:'We believe your files are yours. Every tool on RelahConvert runs entirely in your browser. Nothing is ever sent to our servers, stored, or shared.', s2_h:'Our Mission', s2_p:'To make professional image tools accessible to everyone, for free, with zero compromise on privacy.', s3_h:'Why RelahConvert?', features:['100% free, no account required','Files never leave your device','No ads, no tracking, no nonsense','Works on any modern browser'] },
      fr: { nav_more:"Plus d'outils", nav:{'compress':'Compresser','resize':'Redimensionner','jpg-to-png':'JPG en PNG','jpg-to-pdf':'JPG en PDF','png-to-jpg':'PNG en JPG','jpg-to-webp':'JPG en WebP','webp-to-jpg':'WebP en JPG','png-to-webp':'PNG en WebP','webp-to-png':'WebP en PNG','png-to-pdf':'PNG en PDF'}, footer_copy:'© 2026 RelahConvert. Tous droits réservés.', hero_h1:'À propos de <em>RelahConvert</em>', hero_p:"Des outils d'image gratuits pour tous — avec la confidentialité au cœur.", s1_h:'Qui sommes-nous', s1_p1:"RelahConvert est une suite d'outils d'image gratuits basée sur le navigateur, conçue pour quiconque a besoin de convertir, compresser ou redimensionner des images rapidement — sans télécharger de fichiers sur un serveur.", s1_p2:"Nous pensons que vos fichiers vous appartiennent. Chaque outil fonctionne entièrement dans votre navigateur. Rien n'est jamais envoyé à nos serveurs.", s2_h:'Notre mission', s2_p:"Rendre les outils d'image professionnels accessibles à tous, gratuitement, sans compromis sur la confidentialité.", s3_h:'Pourquoi RelahConvert ?', features:['100 % gratuit, aucun compte requis','Les fichiers ne quittent jamais votre appareil','Pas de publicités, pas de suivi','Fonctionne sur tous les navigateurs modernes'] },
      es: { nav_more:'Más herramientas', nav:{'compress':'Comprimir','resize':'Redimensionar','jpg-to-png':'JPG a PNG','jpg-to-pdf':'JPG a PDF','png-to-jpg':'PNG a JPG','jpg-to-webp':'JPG a WebP','webp-to-jpg':'WebP a JPG','png-to-webp':'PNG a WebP','webp-to-png':'WebP a PNG','png-to-pdf':'PNG a PDF'}, footer_copy:'© 2026 RelahConvert. Todos los derechos reservados.', hero_h1:'Sobre <em>RelahConvert</em>', hero_p:'Herramientas de imagen gratuitas para todos — con la privacidad como base.', s1_h:'Quiénes somos', s1_p1:'RelahConvert es una suite gratuita de herramientas de imagen basada en el navegador, diseñada para quienes necesitan convertir, comprimir o redimensionar imágenes rápidamente — sin subir archivos a un servidor.', s1_p2:'Creemos que tus archivos son tuyos. Cada herramienta funciona completamente en tu navegador. Nada se envía a nuestros servidores.', s2_h:'Nuestra misión', s2_p:'Hacer que las herramientas de imagen profesionales sean accesibles para todos, de forma gratuita, sin comprometer la privacidad.', s3_h:'¿Por qué RelahConvert?', features:['100% gratis, sin cuenta requerida','Los archivos nunca salen de tu dispositivo','Sin anuncios, sin rastreo','Funciona en cualquier navegador moderno'] },
      pt: { nav_more:'Mais ferramentas', nav:{'compress':'Comprimir','resize':'Redimensionar','jpg-to-png':'JPG para PNG','jpg-to-pdf':'JPG para PDF','png-to-jpg':'PNG para JPG','jpg-to-webp':'JPG para WebP','webp-to-jpg':'WebP para JPG','png-to-webp':'PNG para WebP','webp-to-png':'WebP para PNG','png-to-pdf':'PNG para PDF'}, footer_copy:'© 2026 RelahConvert. Todos os direitos reservados.', hero_h1:'Sobre <em>RelahConvert</em>', hero_p:'Ferramentas de imagem gratuitas para todos — com privacidade no centro.', s1_h:'Quem somos', s1_p1:'RelahConvert é uma suíte gratuita de ferramentas de imagem baseada no navegador, criada para quem precisa converter, comprimir ou redimensionar imagens rapidamente — sem fazer upload para um servidor.', s1_p2:'Acreditamos que seus arquivos são seus. Cada ferramenta funciona completamente no seu navegador. Nada é enviado aos nossos servidores.', s2_h:'Nossa missão', s2_p:'Tornar as ferramentas de imagem profissionais acessíveis a todos, gratuitamente, sem comprometer a privacidade.', s3_h:'Por que RelahConvert?', features:['100% grátis, sem conta necessária','Os arquivos nunca saem do seu dispositivo','Sem anúncios, sem rastreamento','Funciona em qualquer navegador moderno'] },
      de: { nav_more:'Mehr Tools', nav:{'compress':'Komprimieren','resize':'Größe ändern','jpg-to-png':'JPG zu PNG','jpg-to-pdf':'JPG zu PDF','png-to-jpg':'PNG zu JPG','jpg-to-webp':'JPG zu WebP','webp-to-jpg':'WebP zu JPG','png-to-webp':'PNG zu WebP','webp-to-png':'WebP zu PNG','png-to-pdf':'PNG zu PDF'}, footer_copy:'© 2026 RelahConvert. Alle Rechte vorbehalten.', hero_h1:'Über <em>RelahConvert</em>', hero_p:'Kostenlose Bildwerkzeuge für alle — mit Datenschutz im Mittelpunkt.', s1_h:'Wer wir sind', s1_p1:'RelahConvert ist eine kostenlose, browserbasierte Bildwerkzeug-Suite für alle, die Bilder schnell konvertieren, komprimieren oder skalieren möchten — ohne Dateien auf einen Server hochzuladen.', s1_p2:'Wir glauben, dass Ihre Dateien Ihnen gehören. Jedes Tool läuft vollständig in Ihrem Browser. Nichts wird an unsere Server gesendet.', s2_h:'Unsere Mission', s2_p:'Professionelle Bildwerkzeuge kostenlos für alle zugänglich zu machen, ohne Kompromisse beim Datenschutz.', s3_h:'Warum RelahConvert?', features:['100% kostenlos, kein Konto erforderlich','Dateien verlassen nie Ihr Gerät','Keine Werbung, kein Tracking','Funktioniert in jedem modernen Browser'] },
      ar: { nav_more:'المزيد من الأدوات', nav:{'compress':'ضغط','resize':'تغيير الحجم','jpg-to-png':'JPG إلى PNG','jpg-to-pdf':'JPG إلى PDF','png-to-jpg':'PNG إلى JPG','jpg-to-webp':'JPG إلى WebP','webp-to-jpg':'WebP إلى JPG','png-to-webp':'PNG إلى WebP','webp-to-png':'WebP إلى PNG','png-to-pdf':'PNG إلى PDF'}, footer_copy:'© 2026 RelahConvert. جميع الحقوق محفوظة.', hero_h1:'عن <em>RelahConvert</em>', hero_p:'أدوات صور مجانية للجميع — مع الخصوصية في القلب.', s1_h:'من نحن', s1_p1:'RelahConvert هي مجموعة أدوات صور مجانية تعمل في المتصفح، مصممة لمن يحتاج إلى تحويل الصور أو ضغطها أو تغيير حجمها بسرعة — دون رفع الملفات إلى خادم.', s1_p2:'نؤمن بأن ملفاتك ملكك. كل أداة في RelahConvert تعمل بالكامل في متصفحك. لا شيء يُرسل إلى خوادمنا.', s2_h:'مهمتنا', s2_p:'جعل أدوات الصور الاحترافية متاحة للجميع مجاناً، دون أي تنازل عن الخصوصية.', s3_h:'لماذا RelahConvert؟', features:['مجاني 100%، لا يلزم حساب','الملفات لا تغادر جهازك أبداً','بدون إعلانات أو تتبع','يعمل على أي متصفح حديث'] },
    };
    var LANGS = [{v:'en',l:'English'},{v:'fr',l:'Français'},{v:'es',l:'Español'},{v:'pt',l:'Português'},{v:'de',l:'Deutsch'},{v:'ar',l:'العربية'}];
    var ALL_SLUGS = ['jpg-to-png','png-to-jpg','jpg-to-webp','webp-to-jpg','png-to-webp','webp-to-png','compress','resize','jpg-to-pdf','png-to-pdf'];
    var ICONS = {'jpg-to-png':'🖼️','png-to-jpg':'🖼️','jpg-to-webp':'🔄','webp-to-jpg':'🔄','png-to-webp':'🔄','webp-to-png':'🔄','compress':'📦','resize':'↔️','jpg-to-pdf':'📄','png-to-pdf':'📄'};
    var MAIN = ['compress','resize','jpg-to-png','jpg-to-pdf'];

    var lang = localStorage.getItem('rc_lang') || 'en';
    var t = T[lang] || T['en'];

    document.getElementById('heroH1').innerHTML = t.hero_h1;
    document.getElementById('heroP').textContent = t.hero_p;
    document.getElementById('s1h').textContent = t.s1_h;
    document.getElementById('s1p1').textContent = t.s1_p1;
    document.getElementById('s1p2').textContent = t.s1_p2;
    document.getElementById('s2h').textContent = t.s2_h;
    document.getElementById('s2p').textContent = t.s2_p;
    document.getElementById('s3h').textContent = t.s3_h;
    document.getElementById('featureList').innerHTML = t.features.map(function(f){ return '<li>'+f+'</li>'; }).join('');
    document.getElementById('footerCopy').textContent = t.footer_copy;
    document.title = t.hero_h1.replace(/<[^>]+>/g,'') + ' | RelahConvert';

    document.getElementById('desktopNav').innerHTML = MAIN.map(function(s){ return '<a href="/'+s+'" class="nav-link">'+t.nav[s]+'</a>'; }).join('') + '<button class="more-btn" id="moreBtn">'+t.nav_more+' <span class="arrow">▼</span></button>';
    document.getElementById('dropdownInner').innerHTML = ALL_SLUGS.map(function(s){ return '<a href="/'+s+'">'+ICONS[s]+' '+t.nav[s]+'</a>'; }).join('');

    var langSelect = document.getElementById('langSelect');
    langSelect.innerHTML = LANGS.map(function(l){ return '<option value="'+l.v+'"'+(l.v===lang?' selected':'')+'>'+l.l+'</option>'; }).join('');
    langSelect.addEventListener('change', function(){ localStorage.setItem('rc_lang', langSelect.value); window.location.reload(); });

    var moreBtn = document.getElementById('moreBtn');
    var hamburgerBtn = document.getElementById('hamburgerBtn');
    var dropdown = document.getElementById('dropdown-menu');
    function toggleDD(e){ e.stopPropagation(); dropdown.classList.toggle('open'); if(moreBtn) moreBtn.classList.toggle('open', dropdown.classList.contains('open')); }
    if(moreBtn) moreBtn.addEventListener('click', toggleDD);
    hamburgerBtn.addEventListener('click', toggleDD);
    document.addEventListener('click', function(){ dropdown.classList.remove('open'); if(moreBtn) moreBtn.classList.remove('open'); });
    dropdown.addEventListener('click', function(e){ e.stopPropagation(); });
  </script>
</body>
</html>
