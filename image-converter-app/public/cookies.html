      'zh-TW': { nav_more:'更多工具', nav:{'compress':'壓縮圖片','resize':'調整圖片大小','jpg-to-png':'JPG轉PNG','jpg-to-pdf':'JPG轉PDF','png-to-jpg':'PNG轉JPG','jpg-to-webp':'JPG轉WebP','webp-to-jpg':'WebP轉JPG','png-to-webp':'PNG轉WebP','webp-to-png':'WebP轉PNG','png-to-pdf':'PNG轉PDF'}, footer_copy:'© 2026 RelahConvert. 保留所有權利。', hero_h1:'<em>Cookie</em> 政策', hero_sub:'最後更新：2026年3月', s1_h:'什麼是Cookie？', s1_p:'Cookie是由瀏覽器儲存在您裝置上的小型文字檔案。它們幫助網站在瀏覽之間記住您的偏好和設定。', s2_h:'我們使用什麼', s2_p:'RelahConvert僅使用一個必要的Cookie：您的語言偏好。當您從頁尾選擇器中選擇語言時，我們會將該選擇儲存在localStorage中，以便網站在您下次造訪時記住它。不會設定其他Cookie。', s3_h:'第三方Cookie', s3_p:'我們不使用任何第三方Cookie。我們不在網站上運行廣告網路、聯盟追蹤器或設定Cookie的社群媒體小工具。', s4_h:'管理Cookie', s4_p:'您可以隨時透過瀏覽器設定清除瀏覽器的localStorage和Cookie。這將把您的語言偏好重設為英語。' },
      bg: { nav_more:'Още инструменти', nav:{'compress':'Компресиране на изображение','resize':'Преоразмеряване на изображение','jpg-to-png':'JPG към PNG','jpg-to-pdf':'JPG към PDF','png-to-jpg':'PNG към JPG','jpg-to-webp':'JPG към WebP','webp-to-jpg':'WebP към JPG','png-to-webp':'PNG към WebP','webp-to-png':'WebP към PNG','png-to-pdf':'PNG към PDF'}, footer_copy:'© 2026 RelahConvert. Всички права запазени.', hero_h1:'Политика за <em>бисквитките</em>', hero_sub:'Последна актуализация: март 2026 г.', s1_h:'Какво представляват бисквитките?', s1_p:'Бисквитките са малки текстови файлове, съхранявани на вашето устройство от браузъра ви. Те помагат на уебсайтовете да запомнят вашите предпочитания и настройки между посещенията.', s2_h:'Какво използваме', s2_p:'RelahConvert използва само една основна бисквитка: вашето езиково предпочитание. Когато изберете език от селектора в долния колонтитул, ние съхраняваме този избор в localStorage, за да може сайтът да го запомни при следващото ви посещение. Не се задават други бисквитки.', s3_h:'Бисквитки на трети страни', s3_p:'Ние не използваме бисквитки на трети страни. Не използваме рекламни мрежи, партньорски тракери или уиджети на социални медии, които задават бисквитки на нашия сайт.', s4_h:'Управление на бисквитките', s4_p:'Можете да изчистите localStorage и бисквитките на браузъра си по всяко време чрез настройките на браузъра. Това ще нулира езиковото ви предпочитание на английски.' },
      ca: { nav_more:'Més eines', nav:{'compress':'Comprimir imatge','resize':'Redimensionar imatge','jpg-to-png':'JPG a PNG','jpg-to-pdf':'JPG a PDF','png-to-jpg':'PNG a JPG','jpg-to-webp':'JPG a WebP','webp-to-jpg':'WebP a JPG','png-to-webp':'PNG a WebP','webp-to-png':'WebP a PNG','png-to-pdf':'PNG a PDF'}, footer_copy:'© 2026 RelahConvert. Tots els drets reservats.', hero_h1:'Política de <em>galetes</em>', hero_sub:'Última actualització: març de 2026', s1_h:'Què són les galetes?', s1_p:'Les galetes són petits fitxers de text emmagatzemats al vostre dispositiu pel navegador. Ajuden els llocs web a recordar les vostres preferències i configuracions entre visites.', s2_h:'Què utilitzem', s2_p:'RelahConvert utilitza una sola galeta essencial: la vostra preferència d\'idioma. Quan seleccioneu un idioma al selector del peu de pàgina, emmagatzemem aquesta elecció al localStorage perquè el lloc la recordi a la vostra pròxima visita. No s\'estableixen altres galetes.', s3_h:'Galetes de tercers', s3_p:'No utilitzem cap galeta de tercers. No executem xarxes publicitàries, rastrejadors d\'afiliats ni ginys de xarxes socials que estableixin galetes al nostre lloc.', s4_h:'Gestió de les galetes', s4_p:'Podeu esborrar el localStorage i les galetes del navegador en qualsevol moment a través de la configuració del navegador. Això restablirà la vostra preferència d\'idioma a l\'anglès.' },
      nl: { nav_more:'Meer tools', nav:{'compress':'Afbeelding comprimeren','resize':'Afbeelding verkleinen','jpg-to-png':'JPG naar PNG','jpg-to-pdf':'JPG naar PDF','png-to-jpg':'PNG naar JPG','jpg-to-webp':'JPG naar WebP','webp-to-jpg':'WebP naar JPG','png-to-webp':'PNG naar WebP','webp-to-png':'WebP naar PNG','png-to-pdf':'PNG naar PDF'}, footer_copy:'© 2026 RelahConvert. Alle rechten voorbehouden.', hero_h1:'<em>Cookie</em>beleid', hero_sub:'Laatst bijgewerkt: maart 2026', s1_h:'Wat zijn cookies?', s1_p:'Cookies zijn kleine tekstbestanden die door uw browser op uw apparaat worden opgeslagen. Ze helpen websites om uw voorkeuren en instellingen tussen bezoeken te onthouden.', s2_h:'Wat wij gebruiken', s2_p:'RelahConvert gebruikt één essentiële cookie: uw taalvoorkeur. Wanneer u een taal selecteert in de taalkiezer onderaan de pagina, slaan we die keuze op in localStorage zodat de site deze bij uw volgende bezoek onthoudt. Er worden geen andere cookies ingesteld.', s3_h:'Cookies van derden', s3_p:'Wij gebruiken geen cookies van derden. Wij maken geen gebruik van advertentienetwerken, affiliate-trackers of sociale media-widgets die cookies op onze site plaatsen.', s4_h:'Cookies beheren', s4_p:'U kunt de localStorage en cookies van uw browser op elk moment wissen via uw browserinstellingen. Hierdoor wordt uw taalvoorkeur teruggezet naar Engels.' },
      el: { nav_more:'Περισσότερα εργαλεία', nav:{'compress':'Συμπίεση εικόνας','resize':'Αλλαγή μεγέθους εικόνας','jpg-to-png':'JPG σε PNG','jpg-to-pdf':'JPG σε PDF','png-to-jpg':'PNG σε JPG','jpg-to-webp':'JPG σε WebP','webp-to-jpg':'WebP σε JPG','png-to-webp':'PNG σε WebP','webp-to-png':'WebP σε PNG','png-to-pdf':'PNG σε PDF'}, footer_copy:'© 2026 RelahConvert. Με επιφύλαξη παντός δικαιώματος.', hero_h1:'Πολιτική <em>Cookies</em>', hero_sub:'Τελευταία ενημέρωση: Μάρτιος 2026', s1_h:'Τι είναι τα cookies;', s1_p:'Τα cookies είναι μικρά αρχεία κειμένου που αποθηκεύονται στη συσκευή σας από το πρόγραμμα περιήγησής σας. Βοηθούν τους ιστότοπους να θυμούνται τις προτιμήσεις και τις ρυθμίσεις σας μεταξύ των επισκέψεων.', s2_h:'Τι χρησιμοποιούμε', s2_p:'Το RelahConvert χρησιμοποιεί ένα μόνο βασικό cookie: την προτίμηση γλώσσας σας. Όταν επιλέγετε μια γλώσσα από τον επιλογέα στο υποσέλιδο, αποθηκεύουμε αυτή την επιλογή στο localStorage ώστε ο ιστότοπος να τη θυμάται στην επόμενη επίσκεψή σας. Δεν ορίζονται άλλα cookies.', s3_h:'Cookies τρίτων', s3_p:'Δεν χρησιμοποιούμε cookies τρίτων. Δεν λειτουργούμε διαφημιστικά δίκτυα, συστήματα παρακολούθησης συνεργατών ή widgets κοινωνικών μέσων που ορίζουν cookies στον ιστότοπό μας.', s4_h:'Διαχείριση cookies', s4_p:'Μπορείτε να διαγράψετε το localStorage και τα cookies του προγράμματος περιήγησής σας ανά πάσα στιγμή μέσω των ρυθμίσεων του προγράμματος περιήγησης. Αυτό θα επαναφέρει την προτίμηση γλώσσας σας στα Αγγλικά.' },
      hi: { nav_more:'और उपकरण', nav:{'compress':'छवि संपीड़ित करें','resize':'छवि का आकार बदलें','jpg-to-png':'JPG से PNG','jpg-to-pdf':'JPG से PDF','png-to-jpg':'PNG से JPG','jpg-to-webp':'JPG से WebP','webp-to-jpg':'WebP से JPG','png-to-webp':'PNG से WebP','webp-to-png':'WebP से PNG','png-to-pdf':'PNG से PDF'}, footer_copy:'© 2026 RelahConvert. सर्वाधिकार सुरक्षित।', hero_h1:'<em>कुकी</em> नीति', hero_sub:'अंतिम अपडेट: मार्च 2026', s1_h:'कुकीज़ क्या हैं?', s1_p:'कुकीज़ छोटी टेक्स्ट फ़ाइलें हैं जो आपके ब्राउज़र द्वारा आपके डिवाइस पर संग्रहीत की जाती हैं। ये वेबसाइटों को विज़िट के बीच आपकी प्राथमिकताओं और सेटिंग्स को याद रखने में मदद करती हैं।', s2_h:'हम क्या उपयोग करते हैं', s2_p:'RelahConvert एक ही आवश्यक कुकी का उपयोग करता है: आपकी भाषा प्राथमिकता। जब आप फ़ुटर सिलेक्टर से कोई भाषा चुनते हैं, तो हम उस चयन को localStorage में संग्रहीत करते हैं ताकि साइट आपकी अगली विज़िट पर इसे याद रखे। कोई अन्य कुकीज़ सेट नहीं की जाती हैं।', s3_h:'तृतीय-पक्ष कुकीज़', s3_p:'हम किसी भी तृतीय-पक्ष कुकीज़ का उपयोग नहीं करते हैं। हम अपनी साइट पर विज्ञापन नेटवर्क, संबद्ध ट्रैकर या सोशल मीडिया विजेट नहीं चलाते जो कुकीज़ सेट करते हैं।', s4_h:'कुकीज़ प्रबंधित करना', s4_p:'आप अपने ब्राउज़र सेटिंग्स के माध्यम से किसी भी समय अपने ब्राउज़र का localStorage और कुकीज़ साफ़ कर सकते हैं। यह आपकी भाषा प्राथमिकता को अंग्रेज़ी पर रीसेट कर देगा।' },
      id: { nav_more:'Alat Lainnya', nav:{'compress':'Kompres Gambar','resize':'Ubah Ukuran Gambar','jpg-to-png':'JPG ke PNG','jpg-to-pdf':'JPG ke PDF','png-to-jpg':'PNG ke JPG','jpg-to-webp':'JPG ke WebP','webp-to-jpg':'WebP ke JPG','png-to-webp':'PNG ke WebP','webp-to-png':'WebP ke PNG','png-to-pdf':'PNG ke PDF'}, footer_copy:'© 2026 RelahConvert. Hak cipta dilindungi undang-undang.', hero_h1:'Kebijakan <em>Cookie</em>', hero_sub:'Terakhir diperbarui: Maret 2026', s1_h:'Apa Itu Cookie?', s1_p:'Cookie adalah file teks kecil yang disimpan di perangkat Anda oleh browser Anda. Cookie membantu situs web mengingat preferensi dan pengaturan Anda di antara kunjungan.', s2_h:'Apa yang Kami Gunakan', s2_p:'RelahConvert menggunakan satu cookie penting: preferensi bahasa Anda. Ketika Anda memilih bahasa dari pemilih di footer, kami menyimpan pilihan tersebut di localStorage sehingga situs mengingatnya pada kunjungan Anda berikutnya. Tidak ada cookie lain yang disetel.', s3_h:'Cookie Pihak Ketiga', s3_p:'Kami tidak menggunakan cookie pihak ketiga apa pun. Kami tidak menjalankan jaringan iklan, pelacak afiliasi, atau widget media sosial yang menetapkan cookie di situs kami.', s4_h:'Mengelola Cookie', s4_p:'Anda dapat menghapus localStorage dan cookie browser Anda kapan saja melalui pengaturan browser. Ini akan mengatur ulang preferensi bahasa Anda ke bahasa Inggris.' },
      ms: { nav_more:'Alat Lain', nav:{'compress':'Mampat Imej','resize':'Ubah Saiz Imej','jpg-to-png':'JPG ke PNG','jpg-to-pdf':'JPG ke PDF','png-to-jpg':'PNG ke JPG','jpg-to-webp':'JPG ke WebP','webp-to-jpg':'WebP ke JPG','png-to-webp':'PNG ke WebP','webp-to-png':'WebP ke PNG','png-to-pdf':'PNG ke PDF'}, footer_copy:'© 2026 RelahConvert. Hak cipta terpelihara.', hero_h1:'Dasar <em>Kuki</em>', hero_sub:'Kemas kini terakhir: Mac 2026', s1_h:'Apakah Kuki?', s1_p:'Kuki ialah fail teks kecil yang disimpan pada peranti anda oleh pelayar anda. Ia membantu laman web mengingati keutamaan dan tetapan anda antara lawatan.', s2_h:'Apa yang Kami Gunakan', s2_p:'RelahConvert menggunakan satu kuki penting sahaja: keutamaan bahasa anda. Apabila anda memilih bahasa daripada pemilih di bahagian bawah, kami menyimpan pilihan tersebut dalam localStorage supaya laman web mengingatnya pada lawatan anda seterusnya. Tiada kuki lain ditetapkan.', s3_h:'Kuki Pihak Ketiga', s3_p:'Kami tidak menggunakan sebarang kuki pihak ketiga. Kami tidak menjalankan rangkaian pengiklanan, penjejak afiliasi atau widget media sosial yang menetapkan kuki di laman kami.', s4_h:'Mengurus Kuki', s4_p:'Anda boleh membersihkan localStorage dan kuki pelayar anda pada bila-bila masa melalui tetapan pelayar. Ini akan menetapkan semula keutamaan bahasa anda kepada bahasa Inggeris.' },
      pl: { nav_more:'Więcej narzędzi', nav:{'compress':'Kompresuj obraz','resize':'Zmień rozmiar obrazu','jpg-to-png':'JPG na PNG','jpg-to-pdf':'JPG na PDF','png-to-jpg':'PNG na JPG','jpg-to-webp':'JPG na WebP','webp-to-jpg':'WebP na JPG','png-to-webp':'PNG na WebP','webp-to-png':'WebP na PNG','png-to-pdf':'PNG na PDF'}, footer_copy:'© 2026 RelahConvert. Wszelkie prawa zastrzeżone.', hero_h1:'Polityka <em>plików cookie</em>', hero_sub:'Ostatnia aktualizacja: marzec 2026', s1_h:'Czym są pliki cookie?', s1_p:'Pliki cookie to małe pliki tekstowe przechowywane na Twoim urządzeniu przez przeglądarkę. Pomagają witrynom internetowym zapamiętywać Twoje preferencje i ustawienia między wizytami.', s2_h:'Z czego korzystamy', s2_p:'RelahConvert używa jednego niezbędnego pliku cookie: Twojej preferencji językowej. Gdy wybierzesz język z selektora w stopce, zapisujemy ten wybór w localStorage, aby strona zapamiętała go przy następnej wizycie. Żadne inne pliki cookie nie są ustawiane.', s3_h:'Pliki cookie podmiotów trzecich', s3_p:'Nie używamy żadnych plików cookie podmiotów trzecich. Nie korzystamy z sieci reklamowych, trackerów afiliacyjnych ani widgetów mediów społecznościowych, które ustawiają pliki cookie na naszej stronie.', s4_h:'Zarządzanie plikami cookie', s4_p:'Możesz wyczyścić localStorage i pliki cookie przeglądarki w dowolnym momencie w ustawieniach przeglądarki. Spowoduje to zresetowanie preferencji językowej na język angielski.' },
      sv: { nav_more:'Fler verktyg', nav:{'compress':'Komprimera bild','resize':'Ändra bildstorlek','jpg-to-png':'JPG till PNG','jpg-to-pdf':'JPG till PDF','png-to-jpg':'PNG till JPG','jpg-to-webp':'JPG till WebP','webp-to-jpg':'WebP till JPG','png-to-webp':'PNG till WebP','webp-to-png':'WebP till PNG','png-to-pdf':'PNG till PDF'}, footer_copy:'© 2026 RelahConvert. Alla rättigheter förbehållna.', hero_h1:'<em>Cookie</em>-policy', hero_sub:'Senast uppdaterad: mars 2026', s1_h:'Vad är cookies?', s1_p:'Cookies är små textfiler som lagras på din enhet av din webbläsare. De hjälper webbplatser att komma ihåg dina inställningar och preferenser mellan besök.', s2_h:'Vad vi använder', s2_p:'RelahConvert använder en enda nödvändig cookie: din språkinställning. När du väljer ett språk i väljaren i sidfoten sparar vi det valet i localStorage så att webbplatsen kommer ihåg det vid ditt nästa besök. Inga andra cookies sätts.', s3_h:'Tredjepartscookies', s3_p:'Vi använder inga tredjepartscookies. Vi kör inga annonsnätverk, affiliate-spårare eller sociala medier-widgets som sätter cookies på vår webbplats.', s4_h:'Hantera cookies', s4_p:'Du kan rensa din webbläsares localStorage och cookies när som helst via webbläsarens inställningar. Detta återställer din språkinställning till engelska.' },
      th: { nav_more:'เครื่องมือเพิ่มเติม', nav:{'compress':'บีบอัดรูปภาพ','resize':'ปรับขนาดรูปภาพ','jpg-to-png':'JPG เป็น PNG','jpg-to-pdf':'JPG เป็น PDF','png-to-jpg':'PNG เป็น JPG','jpg-to-webp':'JPG เป็น WebP','webp-to-jpg':'WebP เป็น JPG','png-to-webp':'PNG เป็น WebP','webp-to-png':'WebP เป็น PNG','png-to-pdf':'PNG เป็น PDF'}, footer_copy:'© 2026 RelahConvert. สงวนลิขสิทธิ์ทุกประการ', hero_h1:'นโยบาย<em>คุกกี้</em>', hero_sub:'อัปเดตล่าสุด: มีนาคม 2026', s1_h:'คุกกี้คืออะไร?', s1_p:'คุกกี้คือไฟล์ข้อความขนาดเล็กที่เบราว์เซอร์จัดเก็บไว้ในอุปกรณ์ของคุณ ช่วยให้เว็บไซต์จดจำการตั้งค่าและความชอบของคุณระหว่างการเยี่ยมชม', s2_h:'สิ่งที่เราใช้', s2_p:'RelahConvert ใช้คุกกี้ที่จำเป็นเพียงหนึ่งรายการ: การตั้งค่าภาษาของคุณ เมื่อคุณเลือกภาษาจากตัวเลือกที่ส่วนท้าย เราจะจัดเก็บตัวเลือกนั้นใน localStorage เพื่อให้เว็บไซต์จดจำได้ในการเยี่ยมชมครั้งถัดไปของคุณ ไม่มีการตั้งค่าคุกกี้อื่น ๆ', s3_h:'คุกกี้ของบุคคลที่สาม', s3_p:'เราไม่ใช้คุกกี้ของบุคคลที่สามใด ๆ เราไม่ได้เปิดใช้เครือข่ายโฆษณา ตัวติดตามพันธมิตร หรือวิดเจ็ตโซเชียลมีเดียที่ตั้งค่าคุกกี้บนเว็บไซต์ของเรา', s4_h:'การจัดการคุกกี้', s4_p:'คุณสามารถล้าง localStorage และคุกกี้ของเบราว์เซอร์ได้ตลอดเวลาผ่านการตั้งค่าเบราว์เซอร์ การดำเนินการนี้จะรีเซ็ตการตั้งค่าภาษาของคุณเป็นภาษาอังกฤษ' },
      tr: { nav_more:'Daha Fazla Araç', nav:{'compress':'Resim Sıkıştır','resize':'Resim Boyutlandır','jpg-to-png':'JPG\'den PNG\'ye','jpg-to-pdf':'JPG\'den PDF\'ye','png-to-jpg':'PNG\'den JPG\'ye','jpg-to-webp':'JPG\'den WebP\'ye','webp-to-jpg':'WebP\'den JPG\'ye','png-to-webp':'PNG\'den WebP\'ye','webp-to-png':'WebP\'den PNG\'ye','png-to-pdf':'PNG\'den PDF\'ye'}, footer_copy:'© 2026 RelahConvert. Tüm hakları saklıdır.', hero_h1:'<em>Çerez</em> Politikası', hero_sub:'Son güncelleme: Mart 2026', s1_h:'Çerezler Nedir?', s1_p:'Çerezler, tarayıcınız tarafından cihazınızda saklanan küçük metin dosyalarıdır. Web sitelerinin ziyaretler arasında tercihlerinizi ve ayarlarınızı hatırlamasına yardımcı olurlar.', s2_h:'Ne Kullanıyoruz', s2_p:'RelahConvert tek bir temel çerez kullanır: dil tercihiniz. Alt bilgi seçicisinden bir dil seçtiğinizde, bu seçimi localStorage\'da saklarız, böylece site bir sonraki ziyaretinizde bunu hatırlar. Başka hiçbir çerez ayarlanmaz.', s3_h:'Üçüncü Taraf Çerezleri', s3_p:'Herhangi bir üçüncü taraf çerezi kullanmıyoruz. Sitemizde çerez ayarlayan reklam ağları, ortaklık izleyicileri veya sosyal medya widget\'ları çalıştırmıyoruz.', s4_h:'Çerezleri Yönetme', s4_p:'Tarayıcınızın localStorage\'ını ve çerezlerini istediğiniz zaman tarayıcı ayarlarınızdan temizleyebilirsiniz. Bu, dil tercihinizi İngilizce\'ye sıfırlayacaktır.' },
      uk: { nav_more:'Більше інструментів', nav:{'compress':'Стиснути зображення','resize':'Змінити розмір зображення','jpg-to-png':'JPG у PNG','jpg-to-pdf':'JPG у PDF','png-to-jpg':'PNG у JPG','jpg-to-webp':'JPG у WebP','webp-to-jpg':'WebP у JPG','png-to-webp':'PNG у WebP','webp-to-png':'WebP у PNG','png-to-pdf':'PNG у PDF'}, footer_copy:'© 2026 RelahConvert. Усі права захищені.', hero_h1:'Політика щодо <em>файлів cookie</em>', hero_sub:'Останнє оновлення: березень 2026 р.', s1_h:'Що таке файли cookie?', s1_p:'Файли cookie — це невеликі текстові файли, які зберігаються на вашому пристрої браузером. Вони допомагають веб-сайтам запам\'ятовувати ваші налаштування та вподобання між відвідуваннями.', s2_h:'Що ми використовуємо', s2_p:'RelahConvert використовує лише один необхідний файл cookie: вашу мовну перевагу. Коли ви обираєте мову у селекторі в нижній частині сторінки, ми зберігаємо цей вибір у localStorage, щоб сайт запам\'ятав його під час вашого наступного відвідування. Інші файли cookie не встановлюються.', s3_h:'Файли cookie третіх сторін', s3_p:'Ми не використовуємо жодних файлів cookie третіх сторін. Ми не використовуємо рекламні мережі, партнерські трекери або віджети соціальних мереж, які встановлюють файли cookie на нашому сайті.', s4_h:'Керування файлами cookie', s4_p:'Ви можете очистити localStorage та файли cookie вашого браузера в будь-який час через налаштування браузера. Це скине вашу мовну перевагу на англійську.' },
      vi: { nav_more:'Thêm công cụ', nav:{'compress':'Nén ảnh','resize':'Thay đổi kích thước ảnh','jpg-to-png':'JPG sang PNG','jpg-to-pdf':'JPG sang PDF','png-to-jpg':'PNG sang JPG','jpg-to-webp':'JPG sang WebP','webp-to-jpg':'WebP sang JPG','png-to-webp':'PNG sang WebP','webp-to-png':'WebP sang PNG','png-to-pdf':'PNG sang PDF'}, footer_copy:'© 2026 RelahConvert. Mọi quyền được bảo lưu.', hero_h1:'Chính sách <em>Cookie</em>', hero_sub:'Cập nhật lần cuối: Tháng 3 năm 2026', s1_h:'Cookie là gì?', s1_p:'Cookie là các tệp văn bản nhỏ được trình duyệt lưu trữ trên thiết bị của bạn. Chúng giúp các trang web ghi nhớ tùy chọn và cài đặt của bạn giữa các lần truy cập.', s2_h:'Chúng tôi sử dụng gì', s2_p:'RelahConvert sử dụng một cookie thiết yếu duy nhất: tùy chọn ngôn ngữ của bạn. Khi bạn chọn ngôn ngữ từ bộ chọn ở chân trang, chúng tôi lưu trữ lựa chọn đó trong localStorage để trang web ghi nhớ nó trong lần truy cập tiếp theo của bạn. Không có cookie nào khác được thiết lập.', s3_h:'Cookie của bên thứ ba', s3_p:'Chúng tôi không sử dụng bất kỳ cookie nào của bên thứ ba. Chúng tôi không chạy mạng quảng cáo, trình theo dõi liên kết hoặc tiện ích mạng xã hội đặt cookie trên trang web của chúng tôi.', s4_h:'Quản lý Cookie', s4_p:'Bạn có thể xóa localStorage và cookie của trình duyệt bất kỳ lúc nào thông qua cài đặt trình duyệt. Điều này sẽ đặt lại tùy chọn ngôn ngữ của bạn về tiếng Anh.' },

    var ALL_SLUGS = ['jpg-to-png','png-to-jpg','jpg-to-webp','webp-to-jpg','png-to-webp','webp-to-png','compress','resize','jpg-to-pdf','png-to-pdf'];
    var ICONS = {'jpg-to-png':'🖼️','png-to-jpg':'🖼️','jpg-to-webp':'🔄','webp-to-jpg':'🔄','png-to-webp':'🔄','webp-to-png':'🔄','compress':'📦','resize':'↔️','jpg-to-pdf':'📄','png-to-pdf':'📄'};
    var MAIN = ['compress','resize','jpg-to-png','jpg-to-pdf'];
    var lang = localStorage.getItem('rc_lang') || 'en';
    var t = T[lang] || T['en'];

    document.getElementById('heroH1').innerHTML = t.hero_h1;
    document.getElementById('heroSub').textContent = t.hero_sub;
    ['s1h','s2h','s3h','s4h'].forEach(function(id,i){ document.getElementById(id).textContent = t['s'+(i+1)+'_h']; });
    ['s1p','s2p','s3p','s4p'].forEach(function(id,i){ document.getElementById(id).textContent = t['s'+(i+1)+'_p']; });
    document.getElementById('footerCopy').textContent = t.footer_copy;
    document.title = t.hero_h1.replace(/<[^>]+>/g,'') + ' | RelahConvert';

    document.getElementById('desktopNav').innerHTML = MAIN.map(function(s){ return '<a href="/'+s+'" class="nav-link">'+t.nav[s]+'</a>'; }).join('') + '<button class="more-btn" id="moreBtn">'+t.nav_more+' <span class="arrow">▼</span></button>';
    document.getElementById('dropdownInner').innerHTML = ALL_SLUGS.map(function(s){ return '<a href="/'+s+'">'+ICONS[s]+' '+t.nav[s]+'</a>'; }).join('');

    var langSelect = document.getElementById('langSelect');
    langSelect.innerHTML = LANGS.map(function(l){ return '<option value="'+l.v+'"'+(l.v===lang?' selected':'')+'>'+l.l+'</option>'; }).join('');
    langSelect.addEventListener('change', function(){ localStorage.setItem('rc_lang', langSelect.value); window.location.reload(); });

    var moreBtn = document.getElementById('moreBtn');
    var hamburgerBtn = document.getElementById('hamburgerBtn');
    var dropdown = document.getElementById('dropdown-menu');
    function toggleDD(e){ e.stopPropagation(); dropdown.classList.toggle('open'); if(moreBtn) moreBtn.classList.toggle('open', dropdown.classList.contains('open')); }
    if(moreBtn) moreBtn.addEventListener('click', toggleDD);
    hamburgerBtn.addEventListener('click', toggleDD);
    document.addEventListener('click', function(){ dropdown.classList.remove('open'); if(moreBtn) moreBtn.classList.remove('open'); });
    dropdown.addEventListener('click', function(e){ e.stopPropagation(); });
  </script>
