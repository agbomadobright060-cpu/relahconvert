    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; }
    body { background: var(--bg-page); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; }
    #site-header { background: var(--bg-card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1280px; margin: 0 auto; padding: 0 32px; height: 64px; display: flex; align-items: center; gap: 32px; }
    .logo { direction: ltr; font-family: 'Fraunces', serif; font-size: 24px; color: var(--text-primary); text-decoration: none; letter-spacing: -0.02em; flex-shrink: 0; display: flex; align-items: center; gap: 7px; line-height: 1; }
    .logo .relah { font-weight: 400; } .logo .convert { font-weight: 900; font-style: italic; color: var(--accent); }
    .desktop-nav { display: flex; align-items: center; gap: 16px; flex: 1; }
    .nav-link { padding: 8px 14px; font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: #111111; text-decoration: none; transition: color 0.15s; white-space: nowrap; }
    [data-theme="dark"] .nav-link { color: var(--text-primary); }
    [data-theme="dark"] .more-btn { color: var(--text-primary); }
    .nav-link:hover { color: var(--accent); }
    .more-btn { padding: 8px 14px; font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: #111111; background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: 'DM Sans', sans-serif; transition: color 0.15s; }
    .more-btn:hover { color: var(--accent); } .more-btn .arrow { font-size: 10px; transition: transform 0.15s; } .more-btn.open .arrow { transform: rotate(180deg); }
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 6px; flex-direction: column; gap: 5px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--text-primary); border-radius: 2px; }
    #dropdown-menu { display: none; position: fixed; top: 64px; left: 0; right: 0; background: var(--bg-card); border-bottom: 1px solid var(--border); box-shadow: 0 8px 24px rgba(0,0,0,0.1); z-index: 99; }
    #dropdown-menu.open { display: block; }
    .dropdown-inner { max-width: 1100px; margin: 0 auto; padding: 16px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
    .dropdown-inner a { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text-primary); text-decoration: none; transition: all 0.15s; }
    .dropdown-inner a:hover { background: var(--bg-surface); color: var(--accent); }
    .page-content { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; flex: 1; }
    .page-hero { margin-bottom: 40px; }

    .page-hero h1 em { font-style: italic; color: var(--accent); }
    .page-hero p { font-size: 13px; color: var(--text-muted); }
    .section { background: var(--bg-card); border-radius: 16px; padding: 32px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .section h2 { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 14px; }
    .section p { font-size: 14px; color: var(--text-secondary); line-height: 1.75; margin-bottom: 12px; }
    .section p:last-child { margin-bottom: 0; }
    .section a { color: var(--accent); }
    #site-footer { background: var(--bg-page); padding: 20px 24px; text-align: center; border-top: 1px solid var(--border); }
    .footer-copy { font-size: 12px; color: var(--text-muted); }
    .lang-bar { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:8px; position:relative; }
    .lang-toggle { background:var(--bg-card); border:1px solid var(--border-light); color:var(--text-secondary); font-size:12px; font-family:'DM Sans',sans-serif; padding:5px 12px; border-radius:6px; cursor:pointer; outline:none; display:inline-flex; align-items:center; gap:6px; transition:border-color 0.15s; }
    .lang-toggle:hover { border-color:var(--accent); }
    .lang-toggle .lang-arrow { font-size:9px; transition:transform 0.15s; display:inline-block; }
    .lang-toggle.open .lang-arrow { transform:rotate(180deg); }
    .lang-grid-wrap { display:none; position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%); background:var(--bg-card); border:1px solid var(--border); border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,0.12); padding:12px; z-index:200; width:480px; max-height:60vh; overflow-y:auto; }
    .lang-grid-wrap.open { display:block; }
    .lang-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; }
    .lang-grid a { display:flex; align-items:center; gap:6px; padding:8px 10px; border-radius:6px; font-size:13px; font-weight:400; color:var(--text-secondary); text-decoration:none; font-family:'DM Sans',sans-serif; transition:background 0.12s; white-space:nowrap; cursor:pointer; }
    .lang-grid a:hover { background:var(--bg-surface); color:var(--text-primary); }
    .lang-grid a.active { font-weight:600; color:var(--accent); }
    .lang-grid a .lang-check { width:16px; flex-shrink:0; font-size:13px; color:var(--accent); text-align:center; }
    @media(max-width:600px) { .lang-grid-wrap { width:calc(100vw - 32px); } .lang-grid { grid-template-columns:repeat(2,1fr); } }
    @media(max-width:360px) { .lang-grid { grid-template-columns:1fr; } }
    .theme-toggle { background: none; border: 1px solid var(--border-light); border-radius: 8px; cursor: pointer; padding: 4px 6px; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; transition: all 0.15s;  }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
    @media (max-width: 768px) { .desktop-nav { display: none; } .hamburger { display: flex; } .section { padding: 24px; } .dropdown-inner { grid-template-columns: 1fr 1fr; padding: 12px; gap: 6px; } }

y personal data. We may use anonymous analytics to understand general usage patterns, but this data is never linked to your identity.', s3_h:'Cookies', s3_p:'We use a single cookie to remember your language preference. If you sign in, we store a session token in your browser local storage to keep you logged in. No tracking cookies, advertising cookies, or third-party cookies are used. See our <a href="/cookies">Cookie Policy</a> for more information.', s4_h:'Third Parties', s4_p:'We use Supabase for authentication and secure file storage. We use Google OAuth for optional sign-in. We use CloudConvert Inc. (a Delaware corporation) as our document-conversion partner for the tools listed above — see CloudConvert\'s own privacy policy at cloudconvert.com/privacy. We do not sell or share your data with advertisers. We do not serve ads or use third-party trackers or marketing tools.',signin:'Sign in'

_h:'Terze parti', s4_p:'Utilizziamo Supabase per autenticazione e archiviazione sicura dei file. Utilizziamo Google OAuth per accesso opzionale. I tuoi dati non vengono venduti né condivisi con inserzionisti. Non pubblichiamo annunci né utilizziamo tracker di terze parti.',signin:'Accedi'

rackers of marketingtools van derden.',signin:'Inloggen'

οποιούμε Supabase για επαλήθευση και ασφαλή αποθήκευση αρχείων. Χρησιμοποιούμε Google OAuth για προαιρετική σύνδεση. Τα δεδομένα σας δεν πωλούνται ούτε κοινοποιούνται σε διαφημιστές. Δεν προβάλλουμε διαφημίσεις και δεν χρησιμοποιούμε ιχνηλάτες τρίτων.',signin:'Σύνδεση'
},

},

dengan pengiklan. Kami tidak menyiarkan iklan dan tidak menggunakan penjejak pihak ketiga.',signin:'Log masuk'
