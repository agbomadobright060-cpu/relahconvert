    var T = {
      en: { nav_more:'More Tools', nav:{'compress':'Compress Image','resize':'Resize Image','jpg-to-png':'JPG to PNG','jpg-to-pdf':'JPG to PDF','png-to-jpg':'PNG to JPG','jpg-to-webp':'JPG to WebP','webp-to-jpg':'WebP to JPG','png-to-webp':'PNG to WebP','webp-to-png':'WebP to PNG','png-to-pdf':'PNG to PDF'}, footer_copy:'© 2026 RelahConvert. All rights reserved.', hero_h1:'Privacy <em>Policy</em>', hero_sub:'Last updated: March 2026', s1_h:'No File Uploads', s1_p:'RelahConvert processes all images entirely within your browser. Your files are never uploaded to our servers, stored, or transmitted to any third party. All conversion, compression, and resizing operations happen locally on your device. Exception: the HTML to Image tool transmits the URL you enter to a third-party rendering service to capture the screenshot — no image files are uploaded by you.', s2_h:'Data We Collect', s2_p:'We do not collect personal data. We do not require account registration. We do not store your images or files. We may use anonymous analytics to understand general usage patterns (e.g. page views), but this data is never linked to your identity or your files.', s3_h:'Cookies', s3_p:'We use a single cookie to remember your language preference. No tracking cookies, advertising cookies, or third-party cookies are used. See our <a href="/cookies">Cookie Policy</a> for more information.', s4_h:'Third Parties', s4_p:'We do not share your data with third parties. We do not serve ads. We do not use third-party trackers or marketing tools.' },
      fr: { nav_more:"Plus d'outils", nav:{'compress':'Compresser','resize':'Redimensionner','jpg-to-png':'JPG en PNG','jpg-to-pdf':'JPG en PDF','png-to-jpg':'PNG en JPG','jpg-to-webp':'JPG en WebP','webp-to-jpg':'WebP en JPG','png-to-webp':'PNG en WebP','webp-to-png':'WebP en PNG','png-to-pdf':'PNG en PDF'}, footer_copy:'© 2026 RelahConvert. Tous droits réservés.', hero_h1:'Politique de <em>confidentialité</em>', hero_sub:'Dernière mise à jour : mars 2026', s1_h:'Aucun téléchargement de fichiers', s1_p:'RelahConvert traite toutes les images entièrement dans votre navigateur. Vos fichiers ne sont jamais téléchargés sur nos serveurs, ni stockés, ni transmis à un tiers. Exception : l\'outil HTML en image transmet l\'URL saisie à un service tiers pour capturer la page — aucun fichier image n\'est envoyé par vous.', s2_h:'Données que nous collectons', s2_p:"Nous ne collectons pas de données personnelles. Nous n'exigeons pas d'inscription. Nous ne stockons pas vos images. Nous pouvons utiliser des analyses anonymes pour comprendre les tendances d'utilisation générales.", s3_h:'Cookies', s3_p:'Nous utilisons un seul cookie pour mémoriser votre préférence de langue. Aucun cookie de suivi ou publicitaire n\'est utilisé. Voir notre <a href="/cookies">politique en matière de cookies</a>.', s4_h:'Tiers', s4_p:"Nous ne partageons pas vos données avec des tiers. Nous ne diffusons pas de publicités. Nous n'utilisons pas de traceurs tiers." },
      es: { nav_more:'Más herramientas', nav:{'compress':'Comprimir','resize':'Redimensionar','jpg-to-png':'JPG a PNG','jpg-to-pdf':'JPG a PDF','png-to-jpg':'PNG a JPG','jpg-to-webp':'JPG a WebP','webp-to-jpg':'WebP a JPG','png-to-webp':'PNG a WebP','webp-to-png':'WebP a PNG','png-to-pdf':'PNG a PDF'}, footer_copy:'© 2026 RelahConvert. Todos los derechos reservados.', hero_h1:'Política de <em>privacidad</em>', hero_sub:'Última actualización: marzo 2026', s1_h:'Sin carga de archivos', s1_p:'RelahConvert procesa todas las imágenes completamente en tu navegador. Tus archivos nunca se suben a nuestros servidores, ni se almacenan, ni se transmiten a terceros. Excepción: la herramienta HTML a imagen transmite la URL introducida a un servicio de terceros para capturar la página — tú no subes ningún archivo de imagen.', s2_h:'Datos que recopilamos', s2_p:'No recopilamos datos personales. No requerimos registro de cuenta. No almacenamos tus imágenes. Podemos usar análisis anónimos para comprender patrones de uso generales.', s3_h:'Cookies', s3_p:'Usamos una sola cookie para recordar tu preferencia de idioma. No se usan cookies de seguimiento ni publicitarias. Ver nuestra <a href="/cookies">política de cookies</a>.', s4_h:'Terceros', s4_p:'No compartimos tus datos con terceros. No mostramos anuncios. No usamos rastreadores de terceros.' },
      pt: { nav_more:'Mais ferramentas', nav:{'compress':'Comprimir','resize':'Redimensionar','jpg-to-png':'JPG para PNG','jpg-to-pdf':'JPG para PDF','png-to-jpg':'PNG para JPG','jpg-to-webp':'JPG para WebP','webp-to-jpg':'WebP para JPG','png-to-webp':'PNG para WebP','webp-to-png':'WebP para PNG','png-to-pdf':'PNG para PDF'}, footer_copy:'© 2026 RelahConvert. Todos os direitos reservados.', hero_h1:'Política de <em>privacidade</em>', hero_sub:'Última atualização: março de 2026', s1_h:'Sem upload de arquivos', s1_p:'RelahConvert processa todas as imagens completamente no seu navegador. Seus arquivos nunca são enviados para nossos servidores, armazenados ou transmitidos a terceiros. Exceção: a ferramenta HTML para imagem transmite a URL inserida a um serviço de terceiros para capturar a página — nenhum arquivo de imagem é enviado por você.', s2_h:'Dados que coletamos', s2_p:'Não coletamos dados pessoais. Não exigimos registro de conta. Não armazenamos suas imagens. Podemos usar análises anônimas para entender padrões gerais de uso.', s3_h:'Cookies', s3_p:'Usamos um único cookie para lembrar sua preferência de idioma. Nenhum cookie de rastreamento ou publicidade é usado. Veja nossa <a href="/cookies">política de cookies</a>.', s4_h:'Terceiros', s4_p:'Não compartilhamos seus dados com terceiros. Não exibimos anúncios. Não usamos rastreadores de terceiros.' },
      de: { nav_more:'Mehr Tools', nav:{'compress':'Komprimieren','resize':'Größe ändern','jpg-to-png':'JPG zu PNG','jpg-to-pdf':'JPG zu PDF','png-to-jpg':'PNG zu JPG','jpg-to-webp':'JPG zu WebP','webp-to-jpg':'WebP zu JPG','png-to-webp':'PNG zu WebP','webp-to-png':'WebP zu PNG','png-to-pdf':'PNG zu PDF'}, footer_copy:'© 2026 RelahConvert. Alle Rechte vorbehalten.', hero_h1:'Datenschutz<em>richtlinie</em>', hero_sub:'Zuletzt aktualisiert: März 2026', s1_h:'Kein Datei-Upload', s1_p:'RelahConvert verarbeitet alle Bilder vollständig in Ihrem Browser. Ihre Dateien werden niemals auf unsere Server hochgeladen, gespeichert oder an Dritte übertragen. Ausnahme: Das HTML-zu-Bild-Tool überträgt die eingegebene URL an einen Drittanbieter-Dienst zur Seitenerfassung — Sie laden dabei keine Bilddateien hoch.', s2_h:'Daten, die wir erheben', s2_p:'Wir erheben keine personenbezogenen Daten. Wir erfordern keine Kontoregistrierung. Wir speichern Ihre Bilder nicht. Wir können anonyme Analysen verwenden, um allgemeine Nutzungsmuster zu verstehen.', s3_h:'Cookies', s3_p:'Wir verwenden ein einzelnes Cookie, um Ihre Spracheinstellung zu speichern. Es werden keine Tracking- oder Werbe-Cookies verwendet. Siehe unsere <a href="/cookies">Cookie-Richtlinie</a>.', s4_h:'Dritte', s4_p:'Wir teilen Ihre Daten nicht mit Dritten. Wir schalten keine Werbung. Wir verwenden keine Tracker von Drittanbietern.' },
      ar: { nav_more:'المزيد من الأدوات', nav:{'compress':'ضغط','resize':'تغيير الحجم','jpg-to-png':'JPG إلى PNG','jpg-to-pdf':'JPG إلى PDF','png-to-jpg':'PNG إلى JPG','jpg-to-webp':'JPG إلى WebP','webp-to-jpg':'WebP إلى JPG','png-to-webp':'PNG إلى WebP','webp-to-png':'WebP إلى PNG','png-to-pdf':'PNG إلى PDF'}, footer_copy:'© 2026 RelahConvert. جميع الحقوق محفوظة.', hero_h1:'سياسة <em>الخصوصية</em>', hero_sub:'آخر تحديث: مارس 2026', s1_h:'لا رفع ملفات', s1_p:'يعالج RelahConvert جميع الصور بالكامل داخل متصفحك. ملفاتك لا تُرفع إلى خوادمنا أبداً، ولا تُخزَّن، ولا تُرسَل إلى أي طرف ثالث. استثناء: أداة HTML إلى صورة ترسل الرابط الذي تُدخله إلى خدمة طرف ثالث لالتقاط الصفحة — أنت لا ترفع أي ملف صورة.', s2_h:'البيانات التي نجمعها', s2_p:'لا نجمع بيانات شخصية. لا نطلب تسجيل حساب. لا نخزن صورك. قد نستخدم تحليلات مجهولة الهوية لفهم أنماط الاستخدام العامة.', s3_h:'ملفات تعريف الارتباط', s3_p:'نستخدم ملف تعريف ارتباط واحداً لتذكر تفضيل لغتك. لا تُستخدم ملفات تتبع أو إعلانات. انظر <a href="/cookies">سياسة ملفات تعريف الارتباط</a>.', s4_h:'أطراف ثالثة', s4_p:'لا نشارك بياناتك مع أطراف ثالثة. لا نعرض إعلانات. لا نستخدم أدوات تتبع خارجية.' },
      it: { nav_more:'Altri strumenti', nav:{'compress':'Comprimi immagine','resize':'Ridimensiona immagine','jpg-to-png':'JPG in PNG','jpg-to-pdf':'JPG in PDF','png-to-jpg':'PNG in JPG','jpg-to-webp':'JPG in WebP','webp-to-jpg':'WebP in JPG','png-to-webp':'PNG in WebP','webp-to-png':'WebP in PNG','png-to-pdf':'PNG in PDF'}, footer_copy:'© 2026 RelahConvert. Tutti i diritti riservati.', hero_h1:'Informativa sulla <em>privacy</em>', hero_sub:'Ultimo aggiornamento: marzo 2026', s1_h:'Nessun caricamento di file', s1_p:'RelahConvert elabora tutte le immagini interamente nel tuo browser. I tuoi file non vengono mai caricati sui nostri server, archiviati o trasmessi a terze parti. Tutte le operazioni di conversione, compressione e ridimensionamento avvengono localmente sul tuo dispositivo. Eccezione: lo strumento HTML in immagine trasmette l\'URL inserito a un servizio di terze parti per acquisire lo screenshot — nessun file immagine viene caricato da te.', s2_h:'Dati che raccogliamo', s2_p:'Non raccogliamo dati personali. Non richiediamo la registrazione di un account. Non memorizziamo le tue immagini o file. Possiamo utilizzare analisi anonime per comprendere i modelli di utilizzo generali (ad es. visualizzazioni di pagina), ma questi dati non sono mai collegati alla tua identità o ai tuoi file.', s3_h:'Cookie', s3_p:'Utilizziamo un singolo cookie per ricordare la tua preferenza linguistica. Non vengono utilizzati cookie di tracciamento, cookie pubblicitari o cookie di terze parti. Consulta la nostra <a href="/cookies">Informativa sui cookie</a> per ulteriori informazioni.', s4_h:'Terze parti', s4_p:'Non condividiamo i tuoi dati con terze parti. Non pubblichiamo annunci. Non utilizziamo tracker o strumenti di marketing di terze parti.' },
      ja: { nav_more:'その他のツール', nav:{'compress':'画像を圧縮','resize':'画像をリサイズ','jpg-to-png':'JPGからPNG','jpg-to-pdf':'JPGからPDF','png-to-jpg':'PNGからJPG','jpg-to-webp':'JPGからWebP','webp-to-jpg':'WebPからJPG','png-to-webp':'PNGからWebP','webp-to-png':'WebPからPNG','png-to-pdf':'PNGからPDF'}, footer_copy:'© 2026 RelahConvert. All rights reserved.', hero_h1:'プライバシー<em>ポリシー</em>', hero_sub:'最終更新日：2026年3月', s1_h:'ファイルのアップロードなし', s1_p:'RelahConvertはすべての画像をブラウザ内で完全に処理します。ファイルが当社のサーバーにアップロードされたり、保存されたり、第三者に送信されることは一切ありません。すべての変換、圧縮、リサイズ操作はお使いのデバイス上でローカルに行われます。例外：HTMLから画像ツールは、入力されたURLをスクリーンショット取得のためにサードパーティのレンダリングサービスに送信します — 画像ファイルがあなたによってアップロードされることはありません。', s2_h:'収集するデータ', s2_p:'当社は個人データを収集しません。アカウント登録は不要です。画像やファイルを保存することはありません。一般的な利用パターン（例：ページビュー）を理解するために匿名の分析を使用する場合がありますが、このデータはお客様の身元やファイルに関連付けられることはありません。', s3_h:'Cookie', s3_p:'言語設定を記憶するために単一のCookieを使用しています。トラッキングCookie、広告Cookie、サードパーティCookieは使用していません。詳細は<a href="/cookies">Cookieポリシー</a>をご覧ください。', s4_h:'第三者', s4_p:'当社はお客様のデータを第三者と共有しません。広告は配信しません。サードパーティのトラッカーやマーケティングツールは使用していません。' },
      ru: { nav_more:'Другие инструменты', nav:{'compress':'Сжать изображение','resize':'Изменить размер','jpg-to-png':'JPG в PNG','jpg-to-pdf':'JPG в PDF','png-to-jpg':'PNG в JPG','jpg-to-webp':'JPG в WebP','webp-to-jpg':'WebP в JPG','png-to-webp':'PNG в WebP','webp-to-png':'WebP в PNG','png-to-pdf':'PNG в PDF'}, footer_copy:'© 2026 RelahConvert. Все права защищены.', hero_h1:'Политика <em>конфиденциальности</em>', hero_sub:'Последнее обновление: март 2026', s1_h:'Без загрузки файлов', s1_p:'RelahConvert обрабатывает все изображения полностью в вашем браузере. Ваши файлы никогда не загружаются на наши серверы, не сохраняются и не передаются третьим лицам. Все операции по конвертации, сжатию и изменению размера выполняются локально на вашем устройстве. Исключение: инструмент HTML в изображение передаёт введённый вами URL стороннему сервису рендеринга для захвата скриншота — вы не загружаете никаких файлов изображений.', s2_h:'Данные, которые мы собираем', s2_p:'Мы не собираем персональные данные. Мы не требуем регистрации аккаунта. Мы не храним ваши изображения или файлы. Мы можем использовать анонимную аналитику для понимания общих моделей использования (например, просмотры страниц), но эти данные никогда не связываются с вашей личностью или вашими файлами.', s3_h:'Файлы cookie', s3_p:'Мы используем один файл cookie для запоминания вашего языкового предпочтения. Мы не используем отслеживающие, рекламные или сторонние файлы cookie. Подробнее см. в нашей <a href="/cookies">Политике использования файлов cookie</a>.', s4_h:'Третьи стороны', s4_p:'Мы не передаём ваши данные третьим лицам. Мы не показываем рекламу. Мы не используем сторонние трекеры или маркетинговые инструменты.' },
      ko: { nav_more:'더 많은 도구', nav:{'compress':'이미지 압축','resize':'이미지 크기 조정','jpg-to-png':'JPG를 PNG로','jpg-to-pdf':'JPG를 PDF로','png-to-jpg':'PNG를 JPG로','jpg-to-webp':'JPG를 WebP로','webp-to-jpg':'WebP를 JPG로','png-to-webp':'PNG를 WebP로','webp-to-png':'WebP를 PNG로','png-to-pdf':'PNG를 PDF로'}, footer_copy:'© 2026 RelahConvert. All rights reserved.', hero_h1:'개인정보 <em>보호정책</em>', hero_sub:'최종 업데이트: 2026년 3월', s1_h:'파일 업로드 없음', s1_p:'RelahConvert는 모든 이미지를 브라우저 내에서 완전히 처리합니다. 파일은 당사 서버에 업로드되거나 저장되거나 제3자에게 전송되지 않습니다. 모든 변환, 압축 및 크기 조정 작업은 사용자의 기기에서 로컬로 수행됩니다. 예외: HTML을 이미지로 변환하는 도구는 스크린샷을 캡처하기 위해 입력한 URL을 제3자 렌더링 서비스에 전송합니다 — 이미지 파일이 사용자에 의해 업로드되지는 않습니다.', s2_h:'수집하는 데이터', s2_p:'당사는 개인 데이터를 수집하지 않습니다. 계정 등록이 필요하지 않습니다. 이미지나 파일을 저장하지 않습니다. 일반적인 사용 패턴(예: 페이지 조회수)을 이해하기 위해 익명 분석을 사용할 수 있지만, 이 데이터는 사용자의 신원이나 파일에 연결되지 않습니다.', s3_h:'쿠키', s3_p:'언어 기본 설정을 기억하기 위해 하나의 쿠키를 사용합니다. 추적 쿠키, 광고 쿠키 또는 제3자 쿠키는 사용되지 않습니다. 자세한 내용은 <a href="/cookies">쿠키 정책</a>을 참조하세요.', s4_h:'제3자', s4_p:'당사는 제3자와 데이터를 공유하지 않습니다. 광고를 게재하지 않습니다. 제3자 추적기나 마케팅 도구를 사용하지 않습니다.' },
      zh: { nav_more:'更多工具', nav:{'compress':'压缩图片','resize':'调整图片大小','jpg-to-png':'JPG转PNG','jpg-to-pdf':'JPG转PDF','png-to-jpg':'PNG转JPG','jpg-to-webp':'JPG转WebP','webp-to-jpg':'WebP转JPG','png-to-webp':'PNG转WebP','webp-to-png':'WebP转PNG','png-to-pdf':'PNG转PDF'}, footer_copy:'© 2026 RelahConvert. 保留所有权利。', hero_h1:'隐私<em>政策</em>', hero_sub:'最后更新：2026年3月', s1_h:'无需上传文件', s1_p:'RelahConvert完全在您的浏览器中处理所有图片。您的文件绝不会上传到我们的服务器、存储或传输给任何第三方。所有转换、压缩和调整大小操作均在您的设备上本地进行。例外：HTML转图片工具会将您输入的URL传输至第三方渲染服务以捕获截图——您无需上传任何图片文件。', s2_h:'我们收集的数据', s2_p:'我们不收集个人数据。我们不要求注册账户。我们不存储您的图片或文件。我们可能使用匿名分析来了解一般使用模式（例如页面浏览量），但这些数据绝不会与您的身份或文件相关联。', s3_h:'Cookie', s3_p:'我们使用单个Cookie来记住您的语言偏好。我们不使用跟踪Cookie、广告Cookie或第三方Cookie。请查看我们的<a href="/cookies">Cookie政策</a>了解更多信息。', s4_h:'第三方', s4_p:'我们不与第三方共享您的数据。我们不投放广告。我们不使用第三方跟踪器或营销工具。' },
      'zh-TW': { nav_more:'更多工具', nav:{'compress':'壓縮圖片','resize':'調整圖片大小','jpg-to-png':'JPG轉PNG','jpg-to-pdf':'JPG轉PDF','png-to-jpg':'PNG轉JPG','jpg-to-webp':'JPG轉WebP','webp-to-jpg':'WebP轉JPG','png-to-webp':'PNG轉WebP','webp-to-png':'WebP轉PNG','png-to-pdf':'PNG轉PDF'}, footer_copy:'© 2026 RelahConvert. 保留所有權利。', hero_h1:'隱私<em>政策</em>', hero_sub:'最後更新：2026年3月', s1_h:'無需上傳檔案', s1_p:'RelahConvert完全在您的瀏覽器中處理所有圖片。您的檔案絕不會上傳到我們的伺服器、儲存或傳輸給任何第三方。所有轉換、壓縮和調整大小操作均在您的裝置上本地進行。例外：HTML轉圖片工具會將您輸入的URL傳輸至第三方渲染服務以擷取螢幕截圖——您無需上傳任何圖片檔案。', s2_h:'我們收集的資料', s2_p:'我們不收集個人資料。我們不要求註冊帳戶。我們不儲存您的圖片或檔案。我們可能使用匿名分析來了解一般使用模式（例如頁面瀏覽量），但這些資料絕不會與您的身分或檔案相關聯。', s3_h:'Cookie', s3_p:'我們使用單一Cookie來記住您的語言偏好。我們不使用追蹤Cookie、廣告Cookie或第三方Cookie。請參閱我們的<a href="/cookies">Cookie政策</a>以了解更多資訊。', s4_h:'第三方', s4_p:'我們不與第三方共享您的資料。我們不投放廣告。我們不使用第三方追蹤器或行銷工具。' },
      bg: { nav_more:'Още инструменти', nav:{'compress':'Компресиране на изображение','resize':'Преоразмеряване на изображение','jpg-to-png':'JPG към PNG','jpg-to-pdf':'JPG към PDF','png-to-jpg':'PNG към JPG','jpg-to-webp':'JPG към WebP','webp-to-jpg':'WebP към JPG','png-to-webp':'PNG към WebP','webp-to-png':'WebP към PNG','png-to-pdf':'PNG към PDF'}, footer_copy:'© 2026 RelahConvert. Всички права запазени.', hero_h1:'Политика за <em>поверителност</em>', hero_sub:'Последна актуализация: март 2026', s1_h:'Без качване на файлове', s1_p:'RelahConvert обработва всички изображения изцяло във вашия браузър. Вашите файлове никога не се качват на нашите сървъри, не се съхраняват и не се предават на трети страни. Всички операции по конвертиране, компресиране и преоразмеряване се извършват локално на вашето устройство. Изключение: инструментът HTML към изображение предава въведения от вас URL на услуга на трета страна за заснемане на екранна снимка — вие не качвате никакви файлове с изображения.', s2_h:'Данни, които събираме', s2_p:'Ние не събираме лични данни. Не изискваме регистрация на акаунт. Не съхраняваме вашите изображения или файлове. Може да използваме анонимни анализи за разбиране на общи модели на използване (напр. преглеждания на страници), но тези данни никога не се свързват с вашата самоличност или вашите файлове.', s3_h:'Бисквитки', s3_p:'Използваме една единствена бисквитка, за да запомним вашето езиково предпочитание. Не се използват бисквитки за проследяване, рекламни бисквитки или бисквитки на трети страни. Вижте нашата <a href="/cookies">Политика за бисквитките</a> за повече информация.', s4_h:'Трети страни', s4_p:'Ние не споделяме вашите данни с трети страни. Не показваме реклами. Не използваме тракери или маркетингови инструменти на трети страни.' },
      ca: { nav_more:'Més eines', nav:{'compress':'Comprimir imatge','resize':'Redimensionar imatge','jpg-to-png':'JPG a PNG','jpg-to-pdf':'JPG a PDF','png-to-jpg':'PNG a JPG','jpg-to-webp':'JPG a WebP','webp-to-jpg':'WebP a JPG','png-to-webp':'PNG a WebP','webp-to-png':'WebP a PNG','png-to-pdf':'PNG a PDF'}, footer_copy:'© 2026 RelahConvert. Tots els drets reservats.', hero_h1:'Política de <em>privacitat</em>', hero_sub:'Última actualització: març 2026', s1_h:'Sense càrrega de fitxers', s1_p:'RelahConvert processa totes les imatges completament al vostre navegador. Els vostres fitxers mai no es carreguen als nostres servidors, ni s\'emmagatzemen, ni es transmeten a cap tercer. Totes les operacions de conversió, compressió i redimensionament es realitzen localment al vostre dispositiu. Excepció: l\'eina HTML a imatge transmet l\'URL que introduïu a un servei de renderització de tercers per capturar la captura de pantalla — vosaltres no carregueu cap fitxer d\'imatge.', s2_h:'Dades que recopilem', s2_p:'No recopilem dades personals. No requerim registre de compte. No emmagatzemem les vostres imatges o fitxers. Podem utilitzar analítiques anònimes per comprendre els patrons d\'ús generals (p. ex. visualitzacions de pàgina), però aquestes dades mai no es vinculen a la vostra identitat o als vostres fitxers.', s3_h:'Galetes', s3_p:'Utilitzem una sola galeta per recordar la vostra preferència d\'idioma. No s\'utilitzen galetes de seguiment, galetes publicitàries ni galetes de tercers. Consulteu la nostra <a href="/cookies">Política de galetes</a> per a més informació.', s4_h:'Tercers', s4_p:'No compartim les vostres dades amb tercers. No mostrem anuncis. No utilitzem rastrejadors ni eines de màrqueting de tercers.' },
      nl: { nav_more:'Meer tools', nav:{'compress':'Afbeelding comprimeren','resize':'Afbeelding formaat wijzigen','jpg-to-png':'JPG naar PNG','jpg-to-pdf':'JPG naar PDF','png-to-jpg':'PNG naar JPG','jpg-to-webp':'JPG naar WebP','webp-to-jpg':'WebP naar JPG','png-to-webp':'PNG naar WebP','webp-to-png':'WebP naar PNG','png-to-pdf':'PNG naar PDF'}, footer_copy:'© 2026 RelahConvert. Alle rechten voorbehouden.', hero_h1:'Privacy<em>beleid</em>', hero_sub:'Laatst bijgewerkt: maart 2026', s1_h:'Geen bestandsuploads', s1_p:'RelahConvert verwerkt alle afbeeldingen volledig in uw browser. Uw bestanden worden nooit naar onze servers geüpload, opgeslagen of aan derden doorgegeven. Alle conversie-, compressie- en formaatwijzigingen gebeuren lokaal op uw apparaat. Uitzondering: de HTML naar afbeelding-tool stuurt de door u ingevoerde URL naar een renderingservice van derden om de schermafbeelding vast te leggen — er worden geen afbeeldingsbestanden door u geüpload.', s2_h:'Gegevens die we verzamelen', s2_p:'We verzamelen geen persoonlijke gegevens. We vereisen geen accountregistratie. We slaan uw afbeeldingen of bestanden niet op. We kunnen anonieme analyses gebruiken om algemene gebruikspatronen te begrijpen (bijv. paginaweergaven), maar deze gegevens worden nooit gekoppeld aan uw identiteit of uw bestanden.', s3_h:'Cookies', s3_p:'We gebruiken één cookie om uw taalvoorkeur te onthouden. Er worden geen tracking-cookies, advertentiecookies of cookies van derden gebruikt. Zie ons <a href="/cookies">Cookiebeleid</a> voor meer informatie.', s4_h:'Derden', s4_p:'We delen uw gegevens niet met derden. We tonen geen advertenties. We gebruiken geen trackers of marketingtools van derden.' },
      el: { nav_more:'Περισσότερα εργαλεία', nav:{'compress':'Συμπίεση εικόνας','resize':'Αλλαγή μεγέθους εικόνας','jpg-to-png':'JPG σε PNG','jpg-to-pdf':'JPG σε PDF','png-to-jpg':'PNG σε JPG','jpg-to-webp':'JPG σε WebP','webp-to-jpg':'WebP σε JPG','png-to-webp':'PNG σε WebP','webp-to-png':'WebP σε PNG','png-to-pdf':'PNG σε PDF'}, footer_copy:'© 2026 RelahConvert. Με επιφύλαξη παντός δικαιώματος.', hero_h1:'Πολιτική <em>Απορρήτου</em>', hero_sub:'Τελευταία ενημέρωση: Μάρτιος 2026', s1_h:'Χωρίς μεταφόρτωση αρχείων', s1_p:'Το RelahConvert επεξεργάζεται όλες τις εικόνες εξ ολοκλήρου στο πρόγραμμα περιήγησής σας. Τα αρχεία σας δεν μεταφορτώνονται ποτέ στους διακομιστές μας, δεν αποθηκεύονται ούτε μεταδίδονται σε τρίτους. Όλες οι λειτουργίες μετατροπής, συμπίεσης και αλλαγής μεγέθους πραγματοποιούνται τοπικά στη συσκευή σας. Εξαίρεση: το εργαλείο HTML σε εικόνα μεταδίδει τη διεύθυνση URL που εισάγετε σε μια υπηρεσία απόδοσης τρίτου μέρους για τη λήψη του στιγμιοτύπου οθόνης — δεν μεταφορτώνονται αρχεία εικόνας από εσάς.', s2_h:'Δεδομένα που συλλέγουμε', s2_p:'Δεν συλλέγουμε προσωπικά δεδομένα. Δεν απαιτούμε εγγραφή λογαριασμού. Δεν αποθηκεύουμε τις εικόνες ή τα αρχεία σας. Ενδέχεται να χρησιμοποιούμε ανώνυμα αναλυτικά στοιχεία για την κατανόηση γενικών μοτίβων χρήσης (π.χ. προβολές σελίδων), αλλά αυτά τα δεδομένα δεν συνδέονται ποτέ με την ταυτότητά σας ή τα αρχεία σας.', s3_h:'Cookies', s3_p:'Χρησιμοποιούμε ένα μόνο cookie για να θυμόμαστε τη γλωσσική σας προτίμηση. Δεν χρησιμοποιούνται cookies παρακολούθησης, διαφημιστικά cookies ή cookies τρίτων. Δείτε την <a href="/cookies">Πολιτική Cookies</a> μας για περισσότερες πληροφορίες.', s4_h:'Τρίτα μέρη', s4_p:'Δεν μοιραζόμαστε τα δεδομένα σας με τρίτους. Δεν προβάλλουμε διαφημίσεις. Δεν χρησιμοποιούμε ιχνηλάτες τρίτων ή εργαλεία μάρκετινγκ.' },
      hi: { nav_more:'और उपकरण', nav:{'compress':'छवि संपीड़ित करें','resize':'छवि का आकार बदलें','jpg-to-png':'JPG से PNG','jpg-to-pdf':'JPG से PDF','png-to-jpg':'PNG से JPG','jpg-to-webp':'JPG से WebP','webp-to-jpg':'WebP से JPG','png-to-webp':'PNG से WebP','webp-to-png':'WebP से PNG','png-to-pdf':'PNG से PDF'}, footer_copy:'© 2026 RelahConvert. सर्वाधिकार सुरक्षित।', hero_h1:'गोपनीयता <em>नीति</em>', hero_sub:'अंतिम अपडेट: मार्च 2026', s1_h:'कोई फ़ाइल अपलोड नहीं', s1_p:'RelahConvert सभी छवियों को पूरी तरह से आपके ब्राउज़र में प्रोसेस करता है। आपकी फ़ाइलें कभी भी हमारे सर्वर पर अपलोड नहीं की जातीं, संग्रहीत नहीं की जातीं, या किसी तृतीय पक्ष को प्रेषित नहीं की जातीं। सभी रूपांतरण, संपीड़न और आकार बदलने की क्रियाएँ आपके डिवाइस पर स्थानीय रूप से होती हैं। अपवाद: HTML से छवि उपकरण स्क्रीनशॉट कैप्चर करने के लिए आपके द्वारा दर्ज किए गए URL को तृतीय-पक्ष रेंडरिंग सेवा में भेजता है — आपके द्वारा कोई छवि फ़ाइल अपलोड नहीं की जाती।', s2_h:'हम कौन सा डेटा एकत्र करते हैं', s2_p:'हम व्यक्तिगत डेटा एकत्र नहीं करते। हम खाता पंजीकरण की आवश्यकता नहीं रखते। हम आपकी छवियों या फ़ाइलों को संग्रहीत नहीं करते। हम सामान्य उपयोग पैटर्न (जैसे पृष्ठ दृश्य) को समझने के लिए अनाम विश्लेषण का उपयोग कर सकते हैं, लेकिन यह डेटा कभी भी आपकी पहचान या आपकी फ़ाइलों से नहीं जोड़ा जाता।', s3_h:'कुकीज़', s3_p:'हम आपकी भाषा प्राथमिकता को याद रखने के लिए एक कुकी का उपयोग करते हैं। कोई ट्रैकिंग कुकीज़, विज्ञापन कुकीज़ या तृतीय-पक्ष कुकीज़ का उपयोग नहीं किया जाता। अधिक जानकारी के लिए हमारी <a href="/cookies">कुकी नीति</a> देखें।', s4_h:'तृतीय पक्ष', s4_p:'हम तृतीय पक्षों के साथ आपका डेटा साझा नहीं करते। हम विज्ञापन नहीं दिखाते। हम तृतीय-पक्ष ट्रैकर्स या मार्केटिंग उपकरणों का उपयोग नहीं करते।' },
      id: { nav_more:'Alat Lainnya', nav:{'compress':'Kompres Gambar','resize':'Ubah Ukuran Gambar','jpg-to-png':'JPG ke PNG','jpg-to-pdf':'JPG ke PDF','png-to-jpg':'PNG ke JPG','jpg-to-webp':'JPG ke WebP','webp-to-jpg':'WebP ke JPG','png-to-webp':'PNG ke WebP','webp-to-png':'WebP ke PNG','png-to-pdf':'PNG ke PDF'}, footer_copy:'© 2026 RelahConvert. Hak cipta dilindungi undang-undang.', hero_h1:'Kebijakan <em>Privasi</em>', hero_sub:'Terakhir diperbarui: Maret 2026', s1_h:'Tanpa Unggah File', s1_p:'RelahConvert memproses semua gambar sepenuhnya di dalam browser Anda. File Anda tidak pernah diunggah ke server kami, disimpan, atau dikirimkan ke pihak ketiga mana pun. Semua operasi konversi, kompresi, dan pengubahan ukuran dilakukan secara lokal di perangkat Anda. Pengecualian: alat HTML ke Gambar mengirimkan URL yang Anda masukkan ke layanan rendering pihak ketiga untuk menangkap tangkapan layar — tidak ada file gambar yang diunggah oleh Anda.', s2_h:'Data yang Kami Kumpulkan', s2_p:'Kami tidak mengumpulkan data pribadi. Kami tidak memerlukan pendaftaran akun. Kami tidak menyimpan gambar atau file Anda. Kami mungkin menggunakan analitik anonim untuk memahami pola penggunaan umum (misalnya tampilan halaman), tetapi data ini tidak pernah dikaitkan dengan identitas Anda atau file Anda.', s3_h:'Cookie', s3_p:'Kami menggunakan satu cookie untuk mengingat preferensi bahasa Anda. Tidak ada cookie pelacakan, cookie iklan, atau cookie pihak ketiga yang digunakan. Lihat <a href="/cookies">Kebijakan Cookie</a> kami untuk informasi lebih lanjut.', s4_h:'Pihak Ketiga', s4_p:'Kami tidak membagikan data Anda dengan pihak ketiga. Kami tidak menayangkan iklan. Kami tidak menggunakan pelacak pihak ketiga atau alat pemasaran.' },
      ms: { nav_more:'Lagi Alat', nav:{'compress':'Mampatkan Imej','resize':'Ubah Saiz Imej','jpg-to-png':'JPG ke PNG','jpg-to-pdf':'JPG ke PDF','png-to-jpg':'PNG ke JPG','jpg-to-webp':'JPG ke WebP','webp-to-jpg':'WebP ke JPG','png-to-webp':'PNG ke WebP','webp-to-png':'WebP ke PNG','png-to-pdf':'PNG ke PDF'}, footer_copy:'© 2026 RelahConvert. Hak cipta terpelihara.', hero_h1:'Dasar <em>Privasi</em>', hero_sub:'Kemas kini terakhir: Mac 2026', s1_h:'Tiada Muat Naik Fail', s1_p:'RelahConvert memproses semua imej sepenuhnya dalam pelayar anda. Fail anda tidak pernah dimuat naik ke pelayan kami, disimpan, atau dihantar kepada mana-mana pihak ketiga. Semua operasi penukaran, pemampatan dan pengubahan saiz berlaku secara tempatan pada peranti anda. Pengecualian: alat HTML ke Imej menghantar URL yang anda masukkan kepada perkhidmatan pemaparan pihak ketiga untuk menangkap tangkapan skrin — tiada fail imej dimuat naik oleh anda.', s2_h:'Data yang Kami Kumpul', s2_p:'Kami tidak mengumpul data peribadi. Kami tidak memerlukan pendaftaran akaun. Kami tidak menyimpan imej atau fail anda. Kami mungkin menggunakan analitik tanpa nama untuk memahami corak penggunaan umum (cth. paparan halaman), tetapi data ini tidak pernah dikaitkan dengan identiti anda atau fail anda.', s3_h:'Kuki', s3_p:'Kami menggunakan satu kuki untuk mengingati keutamaan bahasa anda. Tiada kuki penjejakan, kuki pengiklanan, atau kuki pihak ketiga digunakan. Lihat <a href="/cookies">Dasar Kuki</a> kami untuk maklumat lanjut.', s4_h:'Pihak Ketiga', s4_p:'Kami tidak berkongsi data anda dengan pihak ketiga. Kami tidak menyiarkan iklan. Kami tidak menggunakan penjejak pihak ketiga atau alat pemasaran.' },
      pl: { nav_more:'Więcej narzędzi', nav:{'compress':'Kompresuj obraz','resize':'Zmień rozmiar obrazu','jpg-to-png':'JPG na PNG','jpg-to-pdf':'JPG na PDF','png-to-jpg':'PNG na JPG','jpg-to-webp':'JPG na WebP','webp-to-jpg':'WebP na JPG','png-to-webp':'PNG na WebP','webp-to-png':'WebP na PNG','png-to-pdf':'PNG na PDF'}, footer_copy:'© 2026 RelahConvert. Wszelkie prawa zastrzeżone.', hero_h1:'Polityka <em>prywatności</em>', hero_sub:'Ostatnia aktualizacja: marzec 2026', s1_h:'Bez przesyłania plików', s1_p:'RelahConvert przetwarza wszystkie obrazy całkowicie w Twojej przeglądarce. Twoje pliki nigdy nie są przesyłane na nasze serwery, przechowywane ani przekazywane stronom trzecim. Wszystkie operacje konwersji, kompresji i zmiany rozmiaru odbywają się lokalnie na Twoim urządzeniu. Wyjątek: narzędzie HTML na obraz przesyła wprowadzony przez Ciebie adres URL do usługi renderowania strony trzeciej w celu przechwycenia zrzutu ekranu — żadne pliki graficzne nie są przez Ciebie przesyłane.', s2_h:'Dane, które zbieramy', s2_p:'Nie zbieramy danych osobowych. Nie wymagamy rejestracji konta. Nie przechowujemy Twoich obrazów ani plików. Możemy używać anonimowych analiz do zrozumienia ogólnych wzorców użytkowania (np. wyświetleń stron), ale te dane nigdy nie są powiązane z Twoją tożsamością ani Twoimi plikami.', s3_h:'Pliki cookie', s3_p:'Używamy jednego pliku cookie do zapamiętania Twojego wyboru języka. Nie są używane pliki cookie śledzące, reklamowe ani pliki cookie stron trzecich. Zobacz naszą <a href="/cookies">Politykę plików cookie</a>, aby uzyskać więcej informacji.', s4_h:'Strony trzecie', s4_p:'Nie udostępniamy Twoich danych stronom trzecim. Nie wyświetlamy reklam. Nie używamy trackerów ani narzędzi marketingowych stron trzecich.' },
      sv: { nav_more:'Fler verktyg', nav:{'compress':'Komprimera bild','resize':'Ändra storlek på bild','jpg-to-png':'JPG till PNG','jpg-to-pdf':'JPG till PDF','png-to-jpg':'PNG till JPG','jpg-to-webp':'JPG till WebP','webp-to-jpg':'WebP till JPG','png-to-webp':'PNG till WebP','webp-to-png':'WebP till PNG','png-to-pdf':'PNG till PDF'}, footer_copy:'© 2026 RelahConvert. Alla rättigheter förbehållna.', hero_h1:'Integritets<em>policy</em>', hero_sub:'Senast uppdaterad: mars 2026', s1_h:'Ingen filuppladdning', s1_p:'RelahConvert bearbetar alla bilder helt i din webbläsare. Dina filer laddas aldrig upp till våra servrar, lagras eller överförs till någon tredje part. Alla konverterings-, komprimerings- och storleksändringsoperationer sker lokalt på din enhet. Undantag: verktyget HTML till bild överför den URL du anger till en tredjepartstjänst för rendering för att ta skärmdumpen — inga bildfiler laddas upp av dig.', s2_h:'Data vi samlar in', s2_p:'Vi samlar inte in personuppgifter. Vi kräver ingen kontoregistrering. Vi lagrar inte dina bilder eller filer. Vi kan använda anonym analys för att förstå allmänna användningsmönster (t.ex. sidvisningar), men dessa data kopplas aldrig till din identitet eller dina filer.', s3_h:'Cookies', s3_p:'Vi använder en enda cookie för att komma ihåg din språkinställning. Inga spårningscookies, annonscookies eller tredjepartscookies används. Se vår <a href="/cookies">Cookiepolicy</a> för mer information.', s4_h:'Tredje parter', s4_p:'Vi delar inte dina data med tredje parter. Vi visar inga annonser. Vi använder inga tredjepartsspårare eller marknadsföringsverktyg.' },
      th: { nav_more:'เครื่องมือเพิ่มเติม', nav:{'compress':'บีบอัดรูปภาพ','resize':'ปรับขนาดรูปภาพ','jpg-to-png':'JPG เป็น PNG','jpg-to-pdf':'JPG เป็น PDF','png-to-jpg':'PNG เป็น JPG','jpg-to-webp':'JPG เป็น WebP','webp-to-jpg':'WebP เป็น JPG','png-to-webp':'PNG เป็น WebP','webp-to-png':'WebP เป็น PNG','png-to-pdf':'PNG เป็น PDF'}, footer_copy:'© 2026 RelahConvert. สงวนลิขสิทธิ์', hero_h1:'นโยบาย<em>ความเป็นส่วนตัว</em>', hero_sub:'อัปเดตล่าสุด: มีนาคม 2026', s1_h:'ไม่มีการอัปโหลดไฟล์', s1_p:'RelahConvert ประมวลผลรูปภาพทั้งหมดภายในเบราว์เซอร์ของคุณ ไฟล์ของคุณจะไม่ถูกอัปโหลดไปยังเซิร์ฟเวอร์ของเรา ไม่ถูกจัดเก็บ หรือส่งต่อให้บุคคลที่สาม การแปลง การบีบอัด และการปรับขนาดทั้งหมดเกิดขึ้นในเครื่องของคุณ ข้อยกเว้น: เครื่องมือ HTML เป็นรูปภาพจะส่ง URL ที่คุณป้อนไปยังบริการเรนเดอร์ของบุคคลที่สามเพื่อจับภาพหน้าจอ — ไม่มีไฟล์รูปภาพใดถูกอัปโหลดโดยคุณ', s2_h:'ข้อมูลที่เรารวบรวม', s2_p:'เราไม่รวบรวมข้อมูลส่วนบุคคล เราไม่ต้องการการลงทะเบียนบัญชี เราไม่จัดเก็บรูปภาพหรือไฟล์ของคุณ เราอาจใช้การวิเคราะห์แบบไม่ระบุตัวตนเพื่อทำความเข้าใจรูปแบบการใช้งานทั่วไป (เช่น การดูหน้าเว็บ) แต่ข้อมูลนี้จะไม่ถูกเชื่อมโยงกับตัวตนของคุณหรือไฟล์ของคุณ', s3_h:'คุกกี้', s3_p:'เราใช้คุกกี้เพียงตัวเดียวเพื่อจดจำการตั้งค่าภาษาของคุณ ไม่มีการใช้คุกกี้ติดตาม คุกกี้โฆษณา หรือคุกกี้ของบุคคลที่สาม ดู<a href="/cookies">นโยบายคุกกี้</a>ของเราสำหรับข้อมูลเพิ่มเติม', s4_h:'บุคคลที่สาม', s4_p:'เราไม่แบ่งปันข้อมูลของคุณกับบุคคลที่สาม เราไม่แสดงโฆษณา เราไม่ใช้ตัวติดตามหรือเครื่องมือทางการตลาดของบุคคลที่สาม' },
      tr: { nav_more:'Daha Fazla Araç', nav:{'compress':'Resim Sıkıştır','resize':'Resim Boyutlandır','jpg-to-png':'JPG\'den PNG\'ye','jpg-to-pdf':'JPG\'den PDF\'ye','png-to-jpg':'PNG\'den JPG\'ye','jpg-to-webp':'JPG\'den WebP\'ye','webp-to-jpg':'WebP\'den JPG\'ye','png-to-webp':'PNG\'den WebP\'ye','webp-to-png':'WebP\'den PNG\'ye','png-to-pdf':'PNG\'den PDF\'ye'}, footer_copy:'© 2026 RelahConvert. Tüm hakları saklıdır.', hero_h1:'Gizlilik <em>Politikası</em>', hero_sub:'Son güncelleme: Mart 2026', s1_h:'Dosya Yükleme Yok', s1_p:'RelahConvert tüm görüntüleri tamamen tarayıcınızda işler. Dosyalarınız hiçbir zaman sunucularımıza yüklenmez, depolanmaz veya üçüncü taraflara iletilmez. Tüm dönüştürme, sıkıştırma ve yeniden boyutlandırma işlemleri cihazınızda yerel olarak gerçekleşir. İstisna: HTML\'den Görüntüye aracı, ekran görüntüsünü yakalamak için girdiğiniz URL\'yi üçüncü taraf bir oluşturma hizmetine iletir — sizin tarafınızdan hiçbir görüntü dosyası yüklenmez.', s2_h:'Topladığımız Veriler', s2_p:'Kişisel veri toplamıyoruz. Hesap kaydı gerektirmiyoruz. Görüntülerinizi veya dosyalarınızı saklamıyoruz. Genel kullanım kalıplarını anlamak için anonim analizler kullanabiliriz (ör. sayfa görüntülemeleri), ancak bu veriler hiçbir zaman kimliğinize veya dosyalarınıza bağlanmaz.', s3_h:'Çerezler', s3_p:'Dil tercihinizi hatırlamak için tek bir çerez kullanıyoruz. İzleme çerezleri, reklam çerezleri veya üçüncü taraf çerezleri kullanılmamaktadır. Daha fazla bilgi için <a href="/cookies">Çerez Politikamıza</a> bakın.', s4_h:'Üçüncü Taraflar', s4_p:'Verilerinizi üçüncü taraflarla paylaşmıyoruz. Reklam göstermiyoruz. Üçüncü taraf izleyicileri veya pazarlama araçları kullanmıyoruz.' },

      vi: { nav_more:'Thêm công cụ', nav:{'compress':'Nén ảnh','resize':'Thay đổi kích thước ảnh','jpg-to-png':'JPG sang PNG','jpg-to-pdf':'JPG sang PDF','png-to-jpg':'PNG sang JPG','jpg-to-webp':'JPG sang WebP','webp-to-jpg':'WebP sang JPG','png-to-webp':'PNG sang WebP','webp-to-png':'WebP sang PNG','png-to-pdf':'PNG sang PDF'}, footer_copy:'© 2026 RelahConvert. Mọi quyền được bảo lưu.', hero_h1:'Chính sách <em>Quyền riêng tư</em>', hero_sub:'Cập nhật lần cuối: Tháng 3 năm 2026', s1_h:'Không tải lên tệp', s1_p:'RelahConvert xử lý tất cả hình ảnh hoàn toàn trong trình duyệt của bạn. Các tệp của bạn không bao giờ được tải lên máy chủ của chúng tôi, lưu trữ hoặc truyền cho bất kỳ bên thứ ba nào. Tất cả các thao tác chuyển đổi, nén và thay đổi kích thước đều diễn ra cục bộ trên thiết bị của bạn. Ngoại lệ: công cụ HTML sang Ảnh truyền URL bạn nhập đến dịch vụ kết xuất của bên thứ ba để chụp ảnh màn hình — không có tệp hình ảnh nào được tải lên bởi bạn.', s2_h:'Dữ liệu chúng tôi thu thập', s2_p:'Chúng tôi không thu thập dữ liệu cá nhân. Chúng tôi không yêu cầu đăng ký tài khoản. Chúng tôi không lưu trữ hình ảnh hoặc tệp của bạn. Chúng tôi có thể sử dụng phân tích ẩn danh để hiểu các mẫu sử dụng chung (ví dụ: lượt xem trang), nhưng dữ liệu này không bao giờ được liên kết với danh tính của bạn hoặc các tệp của bạn.', s3_h:'Cookie', s3_p:'Chúng tôi sử dụng một cookie duy nhất để ghi nhớ tùy chọn ngôn ngữ của bạn. Không sử dụng cookie theo dõi, cookie quảng cáo hoặc cookie của bên thứ ba. Xem <a href="/cookies">Chính sách Cookie</a> của chúng tôi để biết thêm thông tin.', s4_h:'Bên thứ ba', s4_p:'Chúng tôi không chia sẻ dữ liệu của bạn với bên thứ ba. Chúng tôi không phân phối quảng cáo. Chúng tôi không sử dụng trình theo dõi hoặc công cụ tiếp thị của bên thứ ba.' },

    var ALL_SLUGS = ['jpg-to-png','png-to-jpg','jpg-to-webp','webp-to-jpg','png-to-webp','webp-to-png','compress','resize','jpg-to-pdf','png-to-pdf'];
    var ICONS = {'jpg-to-png':'🖼️','png-to-jpg':'🖼️','jpg-to-webp':'🔄','webp-to-jpg':'🔄','png-to-webp':'🔄','webp-to-png':'🔄','compress':'📦','resize':'↔️','jpg-to-pdf':'📄','png-to-pdf':'📄'};
    var MAIN = ['compress','resize','jpg-to-png','jpg-to-pdf'];
    var lang = localStorage.getItem('rc_lang') || 'en';
    var t = T[lang] || T['en'];

    document.getElementById('heroH1').innerHTML = t.hero_h1;
    document.getElementById('heroSub').textContent = t.hero_sub;
    document.getElementById('s1h').textContent = t.s1_h;
    document.getElementById('s1p').textContent = t.s1_p;
    document.getElementById('s2h').textContent = t.s2_h;
    document.getElementById('s2p').textContent = t.s2_p;
    document.getElementById('s3h').textContent = t.s3_h;
    document.getElementById('s3p').innerHTML = t.s3_p;
    document.getElementById('s4h').textContent = t.s4_h;
    document.getElementById('s4p').textContent = t.s4_p;
    document.getElementById('footerCopy').textContent = t.footer_copy;
    document.title = t.hero_h1.replace(/<[^>]+>/g,'') + ' | RelahConvert';

    document.getElementById('desktopNav').innerHTML = MAIN.map(function(s){ return '<a href="/'+s+'" class="nav-link">'+t.nav[s]+'</a>'; }).join('') + '<button class="more-btn" id="moreBtn">'+t.nav_more+' <span class="arrow">▼</span></button>';
    document.getElementById('dropdownInner').innerHTML = ALL_SLUGS.map(function(s){ return '<a href="/'+s+'">'+ICONS[s]+' '+t.nav[s]+'</a>'; }).join('');

    var langSelect = document.getElementById('langSelect');
    langSelect.innerHTML = LANGS.map(function(l){ return '<option value="'+l.v+'"'+(l.v===lang?' selected':'')+'>'+l.l+'</option>'; }).join('');
    langSelect.addEventListener('change', function(){ localStorage.setItem('rc_lang', langSelect.value); window.location.reload(); });

    var moreBtn = document.getElementById('moreBtn');
    var hamburgerBtn = document.getElementById('hamburgerBtn');
    var dropdown = document.getElementById('dropdown-menu');
    function toggleDD(e){ e.stopPropagation(); dropdown.classList.toggle('open'); if(moreBtn) moreBtn.classList.toggle('open', dropdown.classList.contains('open')); }
    if(moreBtn) moreBtn.addEventListener('click', toggleDD);
    hamburgerBtn.addEventListener('click', toggleDD);
    document.addEventListener('click', function(){ dropdown.classList.remove('open'); if(moreBtn) moreBtn.classList.remove('open'); });
    dropdown.addEventListener('click', function(e){ e.stopPropagation(); });
  </script>
