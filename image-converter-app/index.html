      .theme-toggle { background: none; border: 1px solid var(--border-light); border-radius: 8px; cursor: pointer; padding: 4px 6px; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; transition: all 0.15s; margin-left: 8px; }
      .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
      @media (max-width: 900px) { .tools-grid { grid-template-columns: repeat(3, 1fr); } }
      @media (max-width: 768px) {
        .desktop-nav { display: none; }
        .hamburger { display: flex; }
        .tools-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .tool-card { padding: 14px; }
        .tool-card .icon { width: 36px; height: 36px; margin-bottom: 8px; }
        .tool-card .icon svg { width: 28px; height: 28px; }
        .tool-card h2 { font-size: 13px; }
        .tool-card p { display: none; }
        .hero { padding: 36px 16px 28px; }
        .dropdown-inner { display: block; padding: 12px; column-count: 2; column-gap: 12px; }
        .dropdown-category { break-inside: avoid; margin-bottom: 12px; }
        .dropdown-category a { font-size: 12px; padding: 6px 4px; }
        .footer-bottom { flex-direction: column; align-items: flex-start; }
        .photo-block { opacity: 0.5; }
        .filter-bar { gap: 6px; }
        .filter-btn { padding: 7px 14px; font-size: 12px; }
      }

      [dir="rtl"] .hero { direction: rtl; text-align: center; }
      [dir="rtl"] .filter-bar { direction: rtl; }
