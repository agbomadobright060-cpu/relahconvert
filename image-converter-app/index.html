<!doctype html>
<html lang="en" id="htmlRoot">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RelahConvert — Free Online Image Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=DM+Sans:wght@400;500;600&display=swap">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { min-height: 100vh; }
      body { font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; background: #EEF1F8; overflow-x: hidden; }
      .bg-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
      .photo-block { position: absolute; background: #fff; border-radius: 10px; box-shadow: 0 4px 16px rgba(80,100,180,0.13), 0 1px 4px rgba(0,0,0,0.07); overflow: hidden; opacity: 0.75; }
      .photo-block .img-area { width: 100%; height: 76%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--c1), var(--c2)); }
      .photo-block .img-area svg { width: 52%; height: 52%; opacity: 0.55; }
      .photo-block .caption-bar { height: 24%; background: #fff; }
      .photo-block:nth-child(1)  { width:105px; height:122px; top:6%;  left:-20px;  transform:rotate(-7deg); --c1:#a8d8ea; --c2:#6fa8d0; }
      .photo-block:nth-child(2)  { width:82px;  height:96px;  top:20%; left:55px;   transform:rotate(5deg);  --c1:#ffd3a5; --c2:#fd9853; }
      .photo-block:nth-child(3)  { width:92px;  height:108px; top:44%; left:-15px;  transform:rotate(-4deg); --c1:#c3b1e1; --c2:#9b84d4; }
      .photo-block:nth-child(4)  { width:76px;  height:90px;  top:63%; left:50px;   transform:rotate(7deg);  --c1:#a8e6cf; --c2:#56c596; }
      .photo-block:nth-child(5)  { width:98px;  height:114px; top:79%; left:-18px;  transform:rotate(-5deg); --c1:#ffc8c8; --c2:#ff8a8a; }
      .photo-block:nth-child(6)  { width:100px; height:118px; top:5%;  right:-18px; transform:rotate(6deg);  --c1:#ffeaa7; --c2:#fdcb6e; }
      .photo-block:nth-child(7)  { width:78px;  height:92px;  top:20%; right:52px;  transform:rotate(-8deg); --c1:#a8d8ea; --c2:#6fb3d3; }
      .photo-block:nth-child(8)  { width:90px;  height:106px; top:45%; right:-15px; transform:rotate(5deg);  --c1:#d4a5c9; --c2:#b56bab; }
      .photo-block:nth-child(9)  { width:74px;  height:88px;  top:63%; right:50px;  transform:rotate(-6deg); --c1:#a8e6cf; --c2:#3dc78e; }
      .photo-block:nth-child(10) { width:96px;  height:112px; top:79%; right:-16px; transform:rotate(7deg);  --c1:#ffd3a5; --c2:#fd8c3c; }
      .bg-fade { position: fixed; inset: 0; pointer-events: none; z-index: 1; background: radial-gradient(ellipse 50% 65% at 50% 40%, rgba(238,241,248,0) 5%, rgba(238,241,248,0.45) 45%, rgba(238,241,248,0.80) 68%); }
      #site-header { background: #fff; border-bottom: 1px solid #E8E0D5; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
      .header-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
      .logo { font-family: 'Fraunces', serif; font-size: 24px; color: #2C1810; text-decoration: none; letter-spacing: -0.02em; flex-shrink: 0; display: flex; flex-direction: row; align-items: center; gap: 7px; line-height: 1; direction: ltr; }
      .logo .relah { font-weight: 400; color: #2C1810; }
      .logo .convert { font-weight: 900; font-style: italic; color: #C84B31; }
      .desktop-nav { display: flex; align-items: center; gap: 0; }
      .nav-link { padding: 8px 14px; font-size: 12px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: #5A4A3A; text-decoration: none; transition: color 0.15s; white-space: nowrap; }
      .nav-link:hover { color: #C84B31; }
      .more-btn { padding: 8px 14px; font-size: 12px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: #5A4A3A; background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: 'DM Sans', sans-serif; transition: color 0.15s; white-space: nowrap; }
      .more-btn:hover { color: #C84B31; }
      .more-btn .arrow { font-size: 10px; transition: transform 0.15s; display: inline-block; }
      .more-btn.open .arrow { transform: rotate(180deg); }
      .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 6px; flex-direction: column; gap: 5px; }
      .hamburger span { display: block; width: 22px; height: 2px; background: #2C1810; border-radius: 2px; }
      #dropdown-menu { display: none; position: fixed; top: 64px; left: 0; right: 0; background: #fff; border-bottom: 1px solid #E8E0D5; box-shadow: 0 8px 24px rgba(0,0,0,0.1); z-index: 99; max-height: calc(100vh - 64px); overflow-y: auto; }
      #dropdown-menu.open { display: block; }
      .dropdown-inner { max-width: 1100px; margin: 0 auto; padding: 16px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
      .dropdown-inner a { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; color: #2C1810; text-decoration: none; transition: all 0.15s; }
      .dropdown-inner a:hover { background: #F5F0E8; color: #C84B31; }
      .hero { text-align: center; padding: 56px 16px 40px; max-width: 700px; margin: 0 auto; position: relative; z-index: 2; }
      .hero h1 { font-family: 'Fraunces', serif; font-size: clamp(32px, 6vw, 52px); font-weight: 900; color: #2C1810; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 14px; }
      .hero h1 em { font-style: italic; color: #C84B31; }
      .hero p { font-size: 15px; color: #7A6A5A; line-height: 1.6; }
      .hero-badge { display: inline-flex; align-items: center; gap: 6px; background: #FDE8E3; color: #C84B31; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 20px; margin-bottom: 20px; letter-spacing: 0.04em; }
      .tools-section { max-width: 1100px; margin: 0 auto; padding: 40px 24px 60px; flex: 1; width: 100%; position: relative; z-index: 2; }
      .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; justify-content: center; }
      .filter-btn { padding: 8px 20px; border-radius: 24px; border: 1.5px solid #DDD5C8; background: #fff; font-size: 13px; font-weight: 600; color: #5A4A3A; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
      .filter-btn:hover { border-color: #C84B31; color: #C84B31; }
      .filter-btn.active { background: #C84B31; border-color: #C84B31; color: #fff; }
      .tool-card[style*="display:none"] { display: none !important; }
      .tools-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
      .tool-card { background: #fff; border-radius: 14px; padding: 20px; text-decoration: none; border: 1.5px solid transparent; box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: all 0.2s; display: block; }
      .tool-card:hover { border-color: #C84B31; box-shadow: 0 4px 16px rgba(200,75,49,0.12); transform: translateY(-2px); }
      .tool-card .icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; overflow: hidden; flex-shrink: 0; }
      .tool-card .icon svg { width: 36px; height: 36px; }
      .tool-card h2 { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 700; color: #2C1810; margin-bottom: 6px; letter-spacing: -0.01em; }
      .tool-card p { font-size: 12px; color: #7A6A5A; line-height: 1.5; }
      #site-footer { background: #2C1810; color: #C8B8A8; font-family: 'DM Sans', sans-serif; margin-top: auto; position: relative; z-index: 2; }
      .footer-inner { max-width: 1100px; margin: 0 auto; padding: 48px 24px 32px; }
      .footer-top { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .footer-col h4 { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #F5F0E8; margin: 0 0 16px; }
      .footer-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
      .footer-col ul li a { font-size: 13px; color: #9A8A7A; text-decoration: none; transition: color 0.15s; }
      .footer-col ul li a:hover { color: #F5F0E8; }
      .footer-bottom { display: flex; align-items: center; justify-content: space-between; padding-top: 24px; gap: 16px; flex-wrap: wrap; }
      .footer-copy { font-size: 12px; color: #6A5A4A; }
      .footer-lang { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #6A5A4A; }
      .lang-select { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #C8B8A8; font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 5px 10px; border-radius: 6px; cursor: pointer; outline: none; }
      .lang-select:focus { border-color: #C84B31; }
      .lang-select option { background: #2C1810; color: #C8B8A8; }
      @media (max-width: 900px) { .tools-grid { grid-template-columns: repeat(3, 1fr); } }
      @media (max-width: 768px) {
        .desktop-nav { display: none; }
        .hamburger { display: flex; }
        .tools-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .tool-card { padding: 14px; }
        .tool-card .icon { width: 36px; height: 36px; margin-bottom: 8px; }
        .tool-card .icon svg { width: 28px; height: 28px; }
        .tool-card h2 { font-size: 13px; }
        .tool-card p { display: none; }
        .hero { padding: 36px 16px 28px; }
        .dropdown-inner { grid-template-columns: 1fr 1fr; padding: 12px; gap: 6px; }
        .footer-bottom { flex-direction: column; align-items: flex-start; }
        .photo-block { opacity: 0.5; }
        .filter-bar { gap: 6px; }
        .filter-btn { padding: 7px 14px; font-size: 12px; }
      }

      /* ── RTL Arabic ── */
      [dir="rtl"] { direction: rtl; }
      [dir="rtl"] .hero { direction: rtl; text-align: center; }
      [dir="rtl"] .filter-bar { direction: rtl; }
      [dir="rtl"] .tool-card { text-align: right; }
      [dir="rtl"] .tool-card .icon { margin-left: auto; margin-right: 0; }
      [dir="rtl"] .tools-grid { direction: rtl; }
      [dir="rtl"] .dropdown-inner { direction: rtl; }
      [dir="rtl"] .dropdown-inner a { flex-direction: row-reverse; }
      [dir="rtl"] .footer-top { direction: rtl; }
      [dir="rtl"] .footer-col ul { text-align: right; }
      [dir="rtl"] .footer-bottom { flex-direction: row-reverse; }
      [dir="rtl"] .footer-lang { flex-direction: row-reverse; }
      [dir="rtl"] .desktop-nav { margin-right: 0; margin-left: 0; justify-content: flex-start; }
      [dir="rtl"] .more-btn svg, [dir="rtl"] .more-btn .arrow { order: -1; }
    </style>
  </head>
  <body>
    <div class="bg-canvas">
      <div class="photo-block"><div class="img-area"><svg viewBox="0 0 60 40" fill="none"><path d="M0 30 L15 15 L25 22 L35 10 L60 30Z" fill="rgba(255,255,255,0.7)"/><circle cx="48" cy="12" r="7" fill="rgba(255,255,255,0.6)"/></svg></div><div class="caption-bar"></div></div>
      <div class="photo-block"><div class="img-area"><svg viewBox="0 0 60 40" fill="none"><path d="M0 32 L20 18 L30 25 L42 12 L60 32Z" fill="rgba(255,255,255,0.7)"/><circle cx="45" cy="10" r="6" fill="rgba(255,255,255,0.6)"/></svg></div><div class="caption-bar"></div></div>
      <div class="photo-block"><div class="img-area"><svg viewBox="0 0 60 40" fill="none"><path d="M0 28 L18 16 L28 22 L40 8 L60 28Z" fill="rgba(255,255,255,0.7)"/><circle cx="50" cy="11" r="8" fill="rgba(255,255,255,0.6)"/></svg></div><div class="caption-bar"></div></div>
      <div class="photo-block"><div class="img-area"><svg viewBox="0 0 60 40" fill="none"><path d="M0 30 L12 14 L24 20 L38 9 L60 30Z" fill="rgba(255,255,255,0.7)"/><circle cx="46" cy="12" r="7" fill="rgba(255,255,255,0.6)"/></svg></div><div class="caption-bar"></div></div>
      <div class="photo-block"><div class="img-area"><svg viewBox="0 0 60 40" fill="none"><path d="M0 32 L16 17 L26 23 L36 11 L60 32Z" fill="rgba(255,255,255,0.7)"/><circle cx="49" cy="10" r="6" fill="rgba(255,255,255,0.6)"/></svg></div><div class="caption-bar"></div></div>
      <div class="photo-block"><div class="img-area"><svg viewBox="0 0 60 40" fill="none"><path d="M0 29 L14 15 L27 21 L39 8 L60 29Z" fill="rgba(255,255,255,0.7)"/><circle cx="47" cy="11" r="7" fill="rgba(255,255,255,0.6)"/></svg></div><div class="caption-bar"></div></div>
      <div class="photo-block"><div class="img-area"><svg viewBox="0 0 60 40" fill="none"><path d="M0 31 L17 16 L29 24 L41 10 L60 31Z" fill="rgba(255,255,255,0.7)"/><circle cx="48" cy="13" r="6" fill="rgba(255,255,255,0.6)"/></svg></div><div class="caption-bar"></div></div>
      <div class="photo-block"><div class="img-area"><svg viewBox="0 0 60 40" fill="none"><path d="M0 30 L13 14 L25 20 L37 9 L60 30Z" fill="rgba(255,255,255,0.7)"/><circle cx="50" cy="12" r="8" fill="rgba(255,255,255,0.6)"/></svg></div><div class="caption-bar"></div></div>
      <div class="photo-block"><div class="img-area"><svg viewBox="0 0 60 40" fill="none"><path d="M0 28 L19 15 L31 22 L43 10 L60 28Z" fill="rgba(255,255,255,0.7)"/><circle cx="44" cy="11" r="7" fill="rgba(255,255,255,0.6)"/></svg></div><div class="caption-bar"></div></div>

          <svg width="22" height="18" viewBox="0 0 26 20" style="flex-shrink:0;order:0;">

    <script type="module">
      import { getLang, setLang, getT, supportedLangs, langLabels } from '/src/core/i18n.js'
      const t = getT()
      const currentLang = getLang()

      if (currentLang === 'ar') {
        document.getElementById('htmlRoot').setAttribute('dir', 'rtl')
        document.getElementById('htmlRoot').setAttribute('lang', 'ar')
      }

      // ── Filter bar ────────────────────────────────────────────────────────
      const f = t.filter || { all: 'All', optimize: 'Optimize', edit: 'Edit', convert: 'Convert', create: 'Create' }
      document.getElementById('filterBar').innerHTML = [
        { key: 'all',      label: f.all      },
        { key: 'optimize', label: f.optimize },
        { key: 'edit',     label: f.edit     },
        { key: 'create',   label: f.create || 'Create' },
        { key: 'convert',  label: f.convert  },
      ].map(({key, label}) =>
        `<button class="filter-btn${key === 'all' ? ' active' : ''}" data-filter="${key}">${label}</button>`
      ).join('')

      const mainLinks = ['compress', 'resize', 'jpg-to-png', 'jpg-to-pdf']
      const allSlugs = [
        'jpg-to-png','png-to-jpg','jpg-to-webp','webp-to-jpg','png-to-webp','webp-to-png',
        'compress','resize','jpg-to-pdf','png-to-pdf',
        'gif-to-jpg','gif-to-png','bmp-to-jpg','bmp-to-png','tiff-to-jpg',
        'jpg-to-gif','png-to-gif',
        'crop','rotate','flip','grayscale','watermark','round-corners','meme-generator','blur-face',
        'remove-background','heic-to-jpg','image-to-ico','jpg-to-svg','html-to-image'
      ]

      // ── Category map ──────────────────────────────────────────────────────
      const categoryMap = {
        'compress':          'optimize',
        'resize':            'optimize',
        'remove-background': 'optimize',
        'crop':              'edit',
        'rotate':            'edit',
        'flip':              'edit',
        'grayscale':         'edit',
        'watermark':         'edit',
        'round-corners':     'edit',
        'meme-generator':    'create',
        'blur-face':         'create',
        'jpg-to-png':        'convert',
        'png-to-jpg':        'convert',
        'jpg-to-webp':       'convert',
        'webp-to-jpg':       'convert',
        'png-to-webp':       'convert',
        'webp-to-png':       'convert',
        'jpg-to-pdf':        'convert',
        'png-to-pdf':        'convert',
        'gif-to-jpg':        'convert',
        'gif-to-png':        'convert',
        'bmp-to-jpg':        'convert',
        'bmp-to-png':        'convert',
        'tiff-to-jpg':       'convert',
        'jpg-to-gif':        'convert',
        'png-to-gif':        'convert',
        'heic-to-jpg':       'convert',
        'image-to-ico':        'convert',
        'jpg-to-svg':          'convert',
        'html-to-image':  'create',
      }

      document.getElementById('desktopNav').innerHTML =
        mainLinks.map(slug => `<a href="/${slug}" class="nav-link">${t.nav_short[slug]}</a>`).join('') +
        `<button class="more-btn" id="moreBtn">${t.nav_more_tools} <span class="arrow">▼</span></button>`
      document.getElementById('heroBadge').textContent = t.hero_badge
      document.getElementById('heroTitle').innerHTML = `${t.hero_title_1}<br>${t.hero_title_2} <em>${t.hero_title_em}</em>`
      document.getElementById('heroDesc').innerHTML = t.hero_desc

      const svgIcons = {
        'compress':          { bg: '#E8F4FB', svg: `<svg viewBox="0 0 40 40" fill="none"><rect x="8" y="8" width="24" height="24" rx="4" fill="#3B9ECC" opacity="0.2"/><path d="M20 12v8M20 20l-4 4M20 20l4 4" stroke="#3B9ECC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M13 28h14" stroke="#3B9ECC" stroke-width="2.5" stroke-linecap="round"/><path d="M16 14h-4v-4M24 14h4v-4" stroke="#3B9ECC" stroke-width="2" stroke-linecap="round"/></svg>` },

        { href: '/gif-to-png',        title: t.nav_short['gif-to-png']   || 'GIF to PNG',             desc: cardDesc('gif-to-png',        'Convert GIF to PNG free.'),                  cat: 'convert' },
        { href: '/bmp-to-jpg',        title: t.nav_short['bmp-to-jpg']   || 'BMP to JPG',             desc: cardDesc('bmp-to-jpg',        'Convert BMP to JPG free.'),                  cat: 'convert' },
        { href: '/bmp-to-png',        title: t.nav_short['bmp-to-png']   || 'BMP to PNG',             desc: cardDesc('bmp-to-png',        'Convert BMP to PNG free.'),                  cat: 'convert' },
        { href: '/tiff-to-jpg',       title: t.nav_short['tiff-to-jpg']  || 'TIFF to JPG',            desc: cardDesc('tiff-to-jpg',       'Convert TIFF to JPG free.'),                 cat: 'convert' },
        { href: '/jpg-to-gif',        title: t.nav_short['jpg-to-gif']   || 'JPG to GIF',             desc: cardDesc('jpg-to-gif',        'Convert JPG to GIF free.'),                  cat: 'convert' },
        { href: '/png-to-gif',        title: t.nav_short['png-to-gif']   || 'PNG to GIF',             desc: cardDesc('png-to-gif',        'Convert PNG to GIF free.'),                  cat: 'convert' },
        { href: '/heic-to-jpg',       title: t.nav_short['heic-to-jpg']  || 'HEIC to JPG',            desc: cardDesc('heic-to-jpg',       'Convert HEIC photos to JPG free.'),          cat: 'convert' },
        { href: '/image-to-ico',      title: t.nav_short['image-to-ico'] || 'Image to ICO',           desc: cardDesc('image-to-ico',      'Convert image to ICO favicon free.'),        cat: 'convert' },
        { href: '/jpg-to-svg',          title: t.nav_short['jpg-to-svg']           || 'JPG to SVG',           desc: cardDesc('jpg-to-svg',         'Convert JPG to SVG free.'),            cat: 'convert' },
        { href: '/html-to-image',  title: t.nav_short?.['html-to-image'] || 'HTML to Image',        desc: t.hti_desc || 'Capture any website as a JPG or PNG image.',              cat: 'create' },
      ]

      document.getElementById('toolsGrid').innerHTML = cardData.map(c => {
        const slug = c.href.replace('/', '')
        const ic = svgIcons[slug] || { bg: '#F5F5F5', svg: '' }
        return `<a href="${c.href}" class="tool-card" data-category="${c.cat}">
          <div class="icon" style="background:${ic.bg}">${ic.svg}</div>
          <h2>${c.title}</h2>
          <p>${c.desc}</p>
        </a>`
      }).join('')

      // ── Filter logic ──────────────────────────────────────────────────────
      document.getElementById('filterBar').addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn')
        if (!btn) return
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        const filter = btn.dataset.filter
        document.querySelectorAll('.tool-card').forEach(card => {
          card.style.display = (filter === 'all' || card.dataset.category === filter) ? '' : 'none'
        })
      })

      document.getElementById('footerCompany').textContent = t.footer_company
      document.getElementById('footerAbout').textContent   = t.footer_about
      document.getElementById('footerContact').textContent = t.footer_contact
      document.getElementById('footerLegal').textContent   = t.footer_legal
      document.getElementById('footerPrivacy').textContent = t.footer_privacy
      document.getElementById('footerTerms').textContent   = t.footer_terms
      document.getElementById('footerCookies').textContent = t.footer_cookies
      document.getElementById('footerCopy').textContent    = t.footer_copy

      const langSelect = document.getElementById('langSelect')
      langSelect.innerHTML = supportedLangs.map(l =>
        `<option value="${l}" ${l === currentLang ? 'selected' : ''}>${langLabels[l]}</option>`
      ).join('')
      langSelect.addEventListener('change', () => { setLang(langSelect.value); window.location.reload() })

      const moreBtn      = document.getElementById('moreBtn')
      const hamburgerBtn = document.getElementById('hamburgerBtn')
      const dropdown     = document.getElementById('dropdown-menu')
      function toggleDropdown(e) {
        e.stopPropagation()
        dropdown.classList.toggle('open')
        if (moreBtn) moreBtn.classList.toggle('open', dropdown.classList.contains('open'))
      }
      if (moreBtn) moreBtn.addEventListener('click', toggleDropdown)
      hamburgerBtn.addEventListener('click', toggleDropdown)
      document.addEventListener('click', () => {
        dropdown.classList.remove('open')
        if (moreBtn) moreBtn.classList.remove('open')
      })
      dropdown.addEventListener('click', e => e.stopPropagation())
    </script>
  </body>
</html>
